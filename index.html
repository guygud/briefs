<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Зельевар Staff-инженера</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
      --orange: #ff961e;
      --purple: #a371f7;
      --radius: 10px;
      --font: 'Manrope', system-ui, sans-serif;
      /* connector palette */
      --hot-bg: rgba(255,150,30,0.12); --hot-fg: #ff961e;
      --cool-bg: rgba(88,166,255,0.12); --cool-fg: #58a6ff;
      --any-bg:  rgba(139,148,158,0.08); --any-fg: #8b949e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    header { padding: 20px 24px 0; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p  { font-size: 0.85rem; color: var(--muted); }

    .game-layout { display: grid; grid-template-columns: 280px 1fr 320px; gap: 16px; padding: 16px 24px 40px; align-items: start; }
    @media (max-width: 900px) { .game-layout { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .col-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }

    /* Quest */
    .quest-card { position: sticky; top: 16px; }
    .quest-badge { display: inline-block; font-size: .7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; }
    .quest-badge.ddos    { background: rgba(248,81,73,.15); color: var(--danger); border: 1px solid rgba(248,81,73,.4); }
    .quest-badge.latency { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.4); }
    .quest-requester { font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
    .quest-story     { font-size: .9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .quest-needs     { background: var(--surface2); border-radius: 8px; padding: 12px; font-size: .85rem; }
    .quest-needs strong { display: block; color: var(--text); margin-bottom: 6px; }
    .quest-need-row  { display: flex; justify-content: space-between; color: var(--muted); padding: 2px 0; }
    .quest-need-row span:last-child { color: var(--text); font-weight: 500; }
    .quest-hint { margin-top: 12px; padding: 10px 12px; background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.25); border-radius: 8px; font-size: .82rem; color: var(--accent); display: none; }
    .quest-hint.visible { display: block; }
    .btn-next { margin-top: 16px; width: 100%; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font); font-size: .9rem; cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-next:hover { border-color: var(--accent); color: var(--accent); }

    /* Cauldron */
    .cauldron-col { display: flex; flex-direction: column; gap: 14px; }

    /* Gold */
    .gold-display { margin-bottom: 14px; }
    .gold-bar-label { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
    .gold-val { font-weight: 700; }
    .gold-val.over { color: var(--danger); }
    .gold-val.warn { color: var(--warn); }

    /* Ritual wrapper zone */
    .ritual-zone {
      border: 1.5px dashed rgba(210,153,34,.5);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 10px;
      background: rgba(210,153,34,.04);
    }
    .ritual-zone-header {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--warn);
      margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .ritual-zone-slots { display: flex; gap: 8px; flex-wrap: wrap; }
    .ritual-slot-card {
      flex: 1; min-width: 120px;
      border: 1.5px solid rgba(210,153,34,.35);
      border-radius: 8px; padding: 8px 10px;
      cursor: pointer; background: var(--surface2);
      transition: border-color .18s;
    }
    .ritual-slot-card:hover  { border-color: var(--warn); }
    .ritual-slot-card.active { border-color: var(--warn); box-shadow: 0 0 0 2px rgba(210,153,34,.2); }
    .ritual-slot-card.filled { border-color: var(--success); }
    .ritual-slot-label    { font-size: .68rem; font-weight: 700; color: var(--warn); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 2px; }
    .ritual-slot-ing      { font-size: .8rem; font-weight: 600; color: var(--text); }
    .ritual-slot-effect   { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .ritual-slot-empty    { font-size: .78rem; color: var(--muted); font-style: italic; }
    .ritual-slot-clear { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: .9rem; line-height: 1; margin-left: 4px; }
    .ritual-slot-clear:hover { color: var(--danger); }

    /* Connector bars */
    .conn-bar {
      height: 22px; display: flex; align-items: center; padding: 0 10px;
      font-size: .62rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0;
    }
    .conn-bar .cbl { margin-left: auto; opacity: .8; }
    .conn-bar.hot  { background: var(--hot-bg);  color: var(--hot-fg); }
    .conn-bar.cool { background: var(--cool-bg); color: var(--cool-fg); }
    .conn-bar.any  { background: var(--any-bg);  color: var(--any-fg); }
    .conn-bar.empty { background: rgba(48,54,61,.4); color: var(--border); }
    .conn-bar.top    { border-radius: var(--radius) var(--radius) 0 0; }
    .conn-bar.bottom { border-radius: 0 0 var(--radius) var(--radius); }

    /* Chain source */
    .chain-source { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border: 1px dashed var(--border); border-radius: 8px; font-size: .8rem; color: var(--muted); margin-bottom: 0; }
    .chain-source .src-pill { margin-left: auto; padding: 2px 8px; border-radius: 20px; font-size: .65rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; background: var(--hot-bg); color: var(--hot-fg); }

    /* Pipeline slots */
    .slots-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 14px; }
    .slot-card { border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color .18s; overflow: hidden; display: flex; flex-direction: column; }
    .slot-card:hover     { border-color: var(--accent); }
    .slot-card.active    { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88,166,255,.2); }
    .slot-card.filled    { border-color: var(--success); }
    .slot-card.conflict  { border-color: var(--danger); }
    .slot-card.waste     { border-color: var(--warn); }
    .slot-inner { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface2); }
    .slot-card.active .slot-inner { background: rgba(88,166,255,.05); }
    .slot-body  { flex: 1; min-width: 0; }
    .slot-label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .slot-label      { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .slot-layer-hint { font-size: .68rem; color: var(--border); }
    .slot-ingredient { font-size: .88rem; font-weight: 600; color: var(--text); }
    .slot-empty-text { font-size: .82rem; color: var(--muted); font-style: italic; }
    .slot-conflict-warn { font-size: .72rem; color: var(--danger); margin-top: 3px; }
    .slot-waste-warn    { font-size: .72rem; color: var(--warn); margin-top: 3px; }
    .slot-clear { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
    .slot-clear:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    /* Bridge */
    .slot-bridge { display: flex; align-items: center; justify-content: center; height: 20px; position: relative; }
    .slot-bridge::before { content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); background: var(--border); }
    .slot-bridge .bi { background: var(--surface); padding: 0 8px; position: relative; z-index: 1; font-size: .7rem; font-weight: 700; }
    .slot-bridge.ok  .bi { color: var(--success); }
    .slot-bridge.bad .bi { color: var(--danger);  }
    .slot-bridge.ok::before  { background: rgba(63,185,80,.4); }
    .slot-bridge.bad::before { background: rgba(248,81,73,.5); }

    /* Meters */
    .meter-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .meter-label { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); }
    .meter-label span:last-child { color: var(--text); font-weight: 600; }
    .meter-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
    .meter-fill  { height: 100%; border-radius: 4px; transition: width .3s ease; }
    .meter-fill.gold       { background: var(--warn); }
    .meter-fill.harm       { background: var(--danger); }
    .meter-fill.smooth     { background: var(--success); }
    .meter-fill.force      { background: var(--purple); }
    .meter-fill.precision  { background: var(--accent); }
    .meter-fill.collateral { background: var(--orange); }
    .meter-limit-line { position: absolute; top: 0; height: 100%; width: 2px; background: rgba(255,255,255,.5); }

    .cauldron-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn-brew  { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font); font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
    .btn-brew:hover  { background: #79b8ff; }
    .btn-brew:active { transform: scale(.97); }
    .btn-reset { padding: 12px 18px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font); font-size: .9rem; cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    /* Result */
    .result-panel { display: none; border-radius: var(--radius); padding: 18px; animation: fadeIn .3s ease; }
    .result-panel.show    { display: block; }
    .result-panel.success { background: rgba(63,185,80,.1);  border: 1px solid rgba(63,185,80,.4); }
    .result-panel.partial { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.4); }
    .result-panel.fail    { background: rgba(248,81,73,.1);  border: 1px solid rgba(248,81,73,.4); }
    .result-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .result-panel.success .result-title { color: var(--success); }
    .result-panel.partial .result-title { color: var(--warn); }
    .result-panel.fail    .result-title { color: var(--danger); }
    .result-text   { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
    .result-extras { font-size: .8rem; color: var(--muted); }
    .result-extras > div { margin-bottom: 4px; }
    .result-extras strong { color: var(--warn); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* Ingredients column */
    .selection-banner { display: none; background: rgba(88,166,255,.1); border: 1px solid rgba(88,166,255,.35); border-radius: 8px; padding: 8px 12px; font-size: .82rem; color: var(--accent); margin-bottom: 8px; }
    .selection-banner.visible { display: block; }
    .ritual-pick-banner { display: none; background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.35); border-radius: 8px; padding: 8px 12px; font-size: .82rem; color: var(--warn); margin-bottom: 8px; }
    .ritual-pick-banner.visible { display: block; }
    .browse-hint { font-size: .75rem; color: var(--muted); text-align: center; padding: 6px 0 10px; font-style: italic; }

    .tab-bar { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
    .tab-btn { flex: 1; padding: 7px 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--font); font-size: .78rem; cursor: pointer; transition: all .15s; white-space: nowrap; text-align: center; }
    .tab-btn:hover  { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .tab-btn.tab-dimmed { opacity: .35; cursor: default; pointer-events: none; }
    .tab-badge { display: none; background: var(--success); color: #fff; border-radius: 10px; padding: 0 5px; font-size: .65rem; font-weight: 700; margin-left: 4px; }
    .tab-badge.visible { display: inline; }

    .ingredients-col { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: calc(100vh - 140px); }

    /* Ingredient card */
    .ingredient-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: border-color .2s; }
    .ingredient-card.in-use    { border-color: var(--success); }
    .ingredient-card.waste     { border-color: var(--warn); }
    .ingredient-card.selectable { cursor: pointer; }
    .ingredient-card.selectable:hover { border-color: var(--accent); }
    .ingredient-card.disabled  { opacity: .42; }
    .ing-content { padding: 12px 14px; }
    .ing-header  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
    .ing-name    { font-size: .9rem; font-weight: 600; flex: 1; }
    .btn-pick    { flex-shrink: 0; padding: 4px 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-family: var(--font); font-size: .78rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-pick:hover { background: #79b8ff; }
    .btn-pick.ritual { background: var(--warn); }
    .btn-pick.ritual:hover { background: #e6b333; }
    .disabled-reason { flex-shrink: 0; font-size: .75rem; color: var(--danger); }
    .in-use-badge    { flex-shrink: 0; font-size: .75rem; color: var(--success); }
    .ing-desc   { font-size: .78rem; color: var(--muted); margin-bottom: 8px; }
    .ing-params { display: flex; flex-wrap: wrap; gap: 5px; }
    .param-tag           { font-size: .7rem; padding: 2px 8px; border-radius: 20px; background: var(--surface2); color: var(--muted); }
    .param-tag.force     { background: rgba(163,113,247,.15); color: var(--purple); }
    .param-tag.precision { background: rgba(88,166,255,.15);  color: var(--accent); }
    .param-tag.harm      { background: rgba(248,81,73,.15);   color: var(--danger); }
    .param-tag.smooth    { background: rgba(63,185,80,.15);   color: var(--success); }
    .param-tag.smoothbad { background: rgba(210,153,34,.15);  color: var(--warn); }
    .param-tag.gold      { background: rgba(210,153,34,.1);   color: var(--warn); }
    .param-tag.collateral{ background: rgba(255,150,30,.15);  color: var(--orange); }
    .param-tag.global    { background: rgba(210,153,34,.12);  color: var(--warn); }
    /* Ritual top banner instead of conn bar */
    .ritual-ing-top { height: 22px; display: flex; align-items: center; padding: 0 10px; font-size: .62rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; background: rgba(210,153,34,.1); color: var(--warn); border-radius: var(--radius) var(--radius) 0 0; }
    .waste-badge { display: none; font-size: .7rem; color: var(--warn); margin-top: 4px; }
    .ingredient-card.waste .waste-badge { display: block; }
  </style>
</head>
<body>

<header>
  <h1>&#x1F9EA; Зельевар Staff-инженера</h1>
  <p>Заполни слоты котла. Следи за типом вмешательства. Не убей пациента.</p>
</header>

<div class="game-layout">

  <!-- LEFT: Quest -->
  <div>
    <div class="col-label">Просьба</div>
    <div class="card quest-card">
      <span class="quest-badge" id="quest-badge"></span>
      <div class="quest-requester" id="quest-requester"></div>
      <div class="quest-story"    id="quest-story"></div>
      <div class="quest-needs">
        <strong>Что нужно зелью:</strong>
        <div id="quest-needs-list"></div>
      </div>
      <div class="quest-hint" id="quest-hint"></div>
      <button class="btn-next" id="btn-next">Следующая просьба &rarr;</button>
    </div>
  </div>

  <!-- CENTER: Cauldron -->
  <div class="cauldron-col">
    <div class="col-label">Котёл</div>
    <div class="card">
      <div id="gold-display"></div>
      <div id="ritual-zone"></div>
      <div class="slots-list" id="cauldron-slots"></div>
      <div id="meters"></div>
      <div class="cauldron-actions">
        <button class="btn-brew"  id="btn-brew">&#x2697; Сварить зелье</button>
        <button class="btn-reset" id="btn-reset">Сброс</button>
      </div>
    </div>
    <div class="result-panel" id="result-panel">
      <div class="result-title" id="result-title"></div>
      <div class="result-text"  id="result-text"></div>
      <div class="result-extras" id="result-extras"></div>
    </div>
  </div>

  <!-- RIGHT: Ingredients -->
  <div>
    <div class="selection-banner" id="selection-banner"></div>
    <div class="ritual-pick-banner" id="ritual-pick-banner"></div>
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-layer="stone"> &#x1FAA8; Камни    <span class="tab-badge" id="badge-stone"></span></button>
      <button class="tab-btn"        data-layer="elixir">&#x1F9EA; Эликсиры <span class="tab-badge" id="badge-elixir"></span></button>
      <button class="tab-btn"        data-layer="smoke"> &#x1F4A8; Дым      <span class="tab-badge" id="badge-smoke"></span></button>
      <button class="tab-btn"        data-layer="ritual">&#x1F56F; Ритуалы  <span class="tab-badge" id="badge-ritual"></span></button>
    </div>
    <div class="ingredients-col" id="ingredients-col"></div>
  </div>

</div>

<script>
// ======================================================================
// DATA
// ======================================================================
//
// inputType / outputType:  hot | cool | any
//   hot  = агрессивное вмешательство (меняет поведение немедленно)
//   cool = мягкое/постепенное действие (наблюдение, тонкая настройка)
//   any  = работает в любом контексте
//
// CONFLICT rule: cool -> hot  (мягкое перед агрессивным = неправильный порядок)
//   hot -> hot  = OK (два агрессивных изменения подряд — нормально)
//   hot -> cool = OK (сначала изменение, потом мониторинг — правильный порядок)
//   cool-> cool = OK (всё мягкое — нет конфликта)
//
// Ритуалы не участвуют в цепочке. Они обёртки команды.
// Их effect применяется глобально ко всему котлу через globalEffect.

const INGREDIENTS = [
  // ---- Камни (stone) — агрессивная защита периметра ----
  {
    id: 'rate_limit', layer: 'stone',
    name: '&#x1F4A7; Капли Rate Limit',
    desc: 'Ставим лимиты на запросы. Грубо, но надёжно. Птицы и фазаны не разбираются.',
    gold: 2, harm: 8, smooth: -5, force: 25, precision: 0,
    inputType: 'hot', outputType: 'hot',
    collateralBase: 6
  },
  {
    id: 'ddos_screen', layer: 'stone',
    name: '&#x1F6E1;&#xFE0F; Дорогой DDoS-экран',
    desc: 'Большой экран, большой счёт. Прайс-лист толще птичьей стаи.',
    gold: 12, harm: 3, smooth: -2, force: 40, precision: 0,
    inputType: 'hot', outputType: 'hot'
  },
  {
    id: 'waf_rune', layer: 'stone',
    name: '&#x1F52E; Руны WAF',
    desc: 'Магические правила фильтрации. Иногда задерживают нужные письма, зато красиво.',
    gold: 8, harm: 7, smooth: -4, force: 20, precision: 5,
    inputType: 'hot', outputType: 'hot',
    collateralBase: 5
  },
  // ---- Эликсиры (elixir) — изменения внутри сервиса ----
  {
    id: 'cache_powder', layer: 'elixir',
    name: '&#x1FAD9; Порошок Кеширования',
    desc: 'Кешируем всё. Агрессивная оптимизация — может сломать. Зато быстро.',
    gold: 5, harm: 5, smooth: 0, force: 10, precision: 18,
    inputType: 'hot', outputType: 'hot'
  },
  {
    id: 'queue_tuner', layer: 'elixir',
    name: '&#x1F9F5; Перо Настройки Очередей',
    desc: 'Тонкая настройка тайм-аутов и пулов потоков. Нудно, постепенно, но помогает.',
    gold: 5, harm: 2, smooth: 3, force: 0, precision: 24,
    inputType: 'cool', outputType: 'cool'
  },
  // ---- Дым (smoke) — мягкое наблюдение ----
  {

// ======================================================================
// MECHANICS
// ======================================================================

// CONFLICT: cool output going into hot input = wrong order (observe before intervene)
function isCompatible(outType, inType) {
  if (!outType || !inType) return true;
  if (outType === 'any' || inType === 'any') return true;
  if (outType === 'cool' && inType === 'hot') return false;
  return true;
}

function calcStats() {
  const s = sc();
  let totalGold = 0, totalHarm = 0, totalSmooth = 0,
      rawForce = 0, rawPrecision = 0, totalCollateral = 0;

  // Pipeline chain
  const filled = s.slots.map(slot => ({ slot, ing: ingById(slotFills[slot.id]) }));

  const penaltySlotIds = new Set();
  for (let i = 0; i < filled.length - 1; i++) {
    const a = filled[i].ing, b = filled[i + 1].ing;
    if (a && b && !isCompatible(a.outputType, b.inputType)) {
      penaltySlotIds.add(filled[i].slot.id);
      penaltySlotIds.add(filled[i + 1].slot.id);
    }
  }

  filled.forEach(({ slot, ing }) => {
    if (!ing) return;
    totalGold       += ing.gold;
    totalHarm       += ing.harm;
    totalSmooth     += ing.smooth;
    if (ing.collateralBase) totalCollateral += ing.collateralBase;
    const p = penaltySlotIds.has(slot.id) ? 0.7 : 1.0;
    rawForce     += ing.force     * p;
    rawPrecision += ing.precision * p;
  });

  // Ritual wrappers — global effects
  const ritualFilled = (s.ritualSlots || []).map(slot => ({ slot, ing: ingById(slotFills[slot.id]) }));
  ritualFilled.forEach(({ ing }) => {
    if (!ing || !ing.globalEffect) return;
    const ge = ing.globalEffect;
    totalGold       += ing.gold;
    totalHarm       -= (ge.harmReduction   || 0);
    totalHarm       += (ge.harmPenalty     || 0);
    totalSmooth     += (ge.smoothBonus     || 0);
    totalSmooth     -= (ge.smoothPenalty   || 0);
    rawForce        += (ge.forceBonus      || 0);
    rawPrecision    += (ge.precisionBonus  || 0);
    totalCollateral -= (ge.collateralReduction || 0);
  });

  totalHarm       = Math.max(0, totalHarm);
  totalCollateral = Math.max(0, totalCollateral);

  const adoption = Math.min(100, Math.max(0, 60 + totalSmooth));
  const factor   = 0.3 + 0.7 * adoption / 100;

  return {
    totalGold, totalHarm, totalSmooth, adoption,
    rawForce, rawPrecision,
    effectiveForce:     rawForce     * factor,
    effectivePrecision: rawPrecision * factor,
    totalCollateral, penaltySlotIds, filled, ritualFilled
  };
}

function calcResult(stats) {
  const s    = sc();
  const need  = s.axis === 'force' ? s.needForce : s.needPrecision;
  const power = s.axis === 'force' ? stats.effectiveForce : stats.effectivePrecision;
  if (power < need)                               return 'fail';
  if (stats.totalCollateral > s.collateralLimit)  return 'partial_collateral';
  if (stats.totalHarm > s.harmLimit)              return 'partial';
  return 'success';
}

function calcWaste(stats) {
  const s = sc();
  const need = s.axis === 'force' ? s.needForce : s.needPrecision;
  const threshold = need * 0.1;
  const ids = new Set();
  stats.filled.forEach(({ ing }) => {
    if (!ing) return;
    const contrib = s.axis === 'force' ? ing.force : ing.precision;
    if (contrib < threshold) ids.add(ing.id);
  });
  return ids;
}

const CONN_LABEL = { hot: 'агрессивное', cool: 'мягкое', any: 'любое', empty: '' };

function connBarHtml(type, side) {
  const t = type || 'empty';
  const lbl = CONN_LABEL[t] || '';
  return `<div class="conn-bar ${t} ${side}"><span class="cbl">${lbl}</span></div>`;
}

function ritualEffectText(ing) {
  if (!ing || !ing.globalEffect) return '';
  const ge = ing.globalEffect;
  const parts = [];
  if (ge.smoothBonus)         parts.push('+' + ge.smoothBonus + ' принятие');
  if (ge.harmReduction)       parts.push('\u2212' + ge.harmReduction + ' вред');
  if (ge.collateralReduction) parts.push('\u2212' + ge.collateralReduction + ' залп');
  if (ge.precisionBonus)      parts.push('+' + ge.precisionBonus + ' точность');
  if (ge.forceBonus)          parts.push('+' + ge.forceBonus + ' сила');
  if (ge.smoothPenalty)       parts.push('\u2212' + ge.smoothPenalty + ' принятие');
  if (ge.harmPenalty)         parts.push('+' + ge.harmPenalty + ' вред');
  return parts.join(', ');
}

function renderSlots(stats) {
  const s = sc();
  const container = document.getElementById('cauldron-slots');
  const LAYER_ICON = { stone: '&#x1FAA8;', elixir: '&#x1F9EA;', smoke: '&#x1F4A8;', ritual: '&#x1F56F;' };

  let html =
    '<div class="chain-source">&#x1F310; <strong>Интернет</strong>' +
      '<span class="src-pill">агрессивное</span>' +
    '</div>' +
    '<div class="slot-bridge"><span class="bi" style="color:var(--hot-fg)">&darr; hot</span></div>';

  s.slots.forEach((slot, idx) => {
    const ing        = ingById(slotFills[slot.id]);
    const isActive   = activeSlotId === slot.id && !isRitualPick;
    const isConflict = stats.penaltySlotIds.has(slot.id);
    const isWaste    = ing && wasteIds.has(ing.id);
    const layerHint  = slot.allowedLayers.map(l => LAYER_ICON[l]).join('/');

    let cardCls = 'slot-card';
    if (isActive)    cardCls += ' active';
    else if (isConflict) cardCls += ' conflict';
    else if (isWaste)    cardCls += ' waste';
    else if (ing)        cardCls += ' filled';

    const topType    = ing ? ing.inputType  : 'empty';
    const bottomType = ing ? ing.outputType : 'empty';
    const clearBtn   = ing ? '<button class="slot-clear" data-slot="' + slot.id + '" title="Убрать">&times;</button>' : '';

    const conflictWarn = isConflict ? '<div class="slot-conflict-warn">&#x26A1; Конфликт: мягкое перед агрессивным &minus;30% мощи</div>' : '';
    const wasteWarn    = isWaste    ? '<div class="slot-waste-warn">&#x26A0;&#xFE0F; Лишний &mdash; не влияет на нужную ось</div>' : '';

    html +=
      '<div class="' + cardCls + '" data-slot="' + slot.id + '">' +
        connBarHtml(topType, 'top') +
        '<div class="slot-inner">' +
          '<div class="slot-body">' +
            '<div class="slot-label-row">' +
              '<span class="slot-label">' + slot.label + '</span>' +
              '<span class="slot-layer-hint">' + layerHint + '</span>' +
            '</div>' +
            (ing
              ? '<div class="slot-ingredient">' + ing.name + '</div>'
              : '<div class="slot-empty-text">' + (isActive ? '&larr; выбери ингредиент' : 'нажми чтобы выбрать') + '</div>'
            ) +
            conflictWarn + wasteWarn +
          '</div>' +
          clearBtn +
        '</div>' +
        connBarHtml(bottomType, 'bottom') +
      '</div>';

    if (idx < s.slots.length - 1) {
      const nextIng = ingById(slotFills[s.slots[idx + 1].id]);
      let bCls = 'slot-bridge', bContent = '<span class="bi">&darr;</span>';
      if (ing && nextIng) {
        const ok = isCompatible(ing.outputType, nextIng.inputType);
        bCls    += ok ? ' ok' : ' bad';
        bContent = ok ? '<span class="bi">&#x2713;</span>' : '<span class="bi">&#x2717; конфликт</span>';
      }
      html += '<div class="' + bCls + '">' + bContent + '</div>';
    }
  });

  container.innerHTML = html;

  container.querySelectorAll('.slot-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.slot-clear')) return;
      const slotId = card.dataset.slot;
      if (activeSlotId === slotId && !isRitualPick) {
        activeSlotId = null;
      } else {
        activeSlotId = slotId; isRitualPick = false;
        const slot = sc().slots.find(sl => sl.id === slotId);
        if (slot && !slot.allowedLayers.includes(currentLayer)) {
          currentLayer = slot.allowedLayers[0];
          syncTabBar();
        }
      }
      updateUI(true);
    });
  });

  container.querySelectorAll('.slot-clear').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      slotFills[btn.dataset.slot] = null;
      if (activeSlotId === btn.dataset.slot) activeSlotId = null;
      updateUI(true);
    });
  });
}

      '<div class="meter-label"><span>&#x2620;&#xFE0F; Вред</span>' +
        '<span style="color:' + harmColor + '">' + stats.totalHarm.toFixed(0) + ' / лимит ' + s.harmLimit + '</span></div>' +
      '<div class="meter-track"><div class="meter-fill harm" style="width:' + harmPct + '%"></div>' +
        '<div class="meter-limit-line" style="left:' + harmLim + '%"></div></div>' +
    '</div>' +
    '<div class="meter-row">' +
      '<div class="meter-label"><span>&#x1F49A; Принятие</span><span>' + stats.adoption.toFixed(0) + '%</span></div>' +
      '<div class="meter-track"><div class="meter-fill smooth" style="width:' + adoptPct + '%"></div></div>' +
    '</div>' +
    '<div class="meter-row">' +
      '<div class="meter-label"><span>&#x1F6E1;&#xFE0F; Сила</span><span>' + stats.effectiveForce.toFixed(1) + '</span></div>' +
      '<div class="meter-track"><div class="meter-fill force" style="width:' + forcePct + '%"></div></div>' +
    '</div>' +
    '<div class="meter-row">' +
      '<div class="meter-label"><span>&#x26A1; Точность</span><span>' + stats.effectivePrecision.toFixed(1) + '</span></div>' +
      '<div class="meter-track"><div class="meter-fill precision" style="width:' + precPct + '%"></div></div>' +
    '</div>';

  if (stats.totalCollateral > 0 || s.collateralLimit < 999) {
    html +=
      '<div class="meter-row">' +
        '<div class="meter-label"><span>&#x1F3AF; Залп по своим</span>' +
          '<span style="color:' + collColor + '">' + stats.totalCollateral.toFixed(0) + ' / ' + (s.collateralLimit < 999 ? s.collateralLimit : '&#x221E;') + '</span></div>' +
        '<div class="meter-track"><div class="meter-fill collateral" style="width:' + collPct + '%"></div>' +
          (s.collateralLimit < 999 ? '<div class="meter-limit-line" style="left:' + collLim + '%"></div>' : '') +
        '</div>' +
      '</div>';
  }

  document.getElementById('meters').innerHTML = html;
}

// ======================================================================
// RENDER: Ingredients
// ======================================================================

function renderIngredients(stats) {
  const s = sc();
  const col = document.getElementById('ingredients-col');

  // Determine picking context
  const pickingPipeline = activeSlotId && !isRitualPick
    ? s.slots.find(sl => sl.id === activeSlotId) : null;
  const pickingRitual   = activeSlotId && isRitualPick
    ? (s.ritualSlots || []).find(sl => sl.id === activeSlotId) : null;

  const allowedLayers = pickingPipeline ? pickingPipeline.allowedLayers
                      : pickingRitual   ? ['ritual']
                      : null;

  const inUseIds = new Set(Object.values(slotFills).filter(Boolean));

  // Banners
  const banner = document.getElementById('selection-banner');
  const rbanner = document.getElementById('ritual-pick-banner');
  const LN = { stone: '&#x1FAA8; Камни', elixir: '&#x1F9EA; Эликсиры', smoke: '&#x1F4A8; Дым', ritual: '&#x1F56F; Ритуалы' };

  if (pickingPipeline) {
    banner.innerHTML = '&#x1F3AF; Выбираешь для: <strong>&#xAB;' + pickingPipeline.label + '&#xBB;</strong> &mdash; ' + pickingPipeline.allowedLayers.map(l => LN[l]).join(' или ');
    banner.classList.add('visible');
    rbanner.classList.remove('visible');
  } else if (pickingRitual) {
    rbanner.innerHTML = '&#x1F503; Выбираешь обёртку: <strong>&#xAB;' + pickingRitual.label + '&#xBB;</strong>';
    rbanner.classList.add('visible');
    banner.classList.remove('visible');
  } else {
    banner.classList.remove('visible');
    rbanner.classList.remove('visible');
  }

  // Tab dimming
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const layer = btn.dataset.layer;
    btn.classList.toggle('tab-dimmed', !!(allowedLayers && !allowedLayers.includes(layer)));
  });

  col.innerHTML = '';

  if (!pickingPipeline && !pickingRitual) {
    const hint = document.createElement('div');
    hint.className = 'browse-hint';
    hint.textContent = '\u2190 Нажми на ячейку котла чтобы выбрать ингредиент';
    col.appendChild(hint);
  }

  INGREDIENTS
    .filter(ing => ing.layer === currentLayer)
    .filter(ing => !allowedLayers || allowedLayers.includes(ing.layer))
    .forEach(ing => {
      const isInUseElsewhere = inUseIds.has(ing.id) && slotFills[activeSlotId] !== ing.id;
      const curCost    = ingById(slotFills[activeSlotId])?.gold || 0;
      const canAfford  = !activeSlotId || (stats.totalGold - curCost + ing.gold <= s.goldBudget);
      const isDisabled = !!(activeSlotId && (isInUseElsewhere || !canAfford));
      const isInSlot   = inUseIds.has(ing.id);
      const isWaste    = wasteIds.has(ing.id);
      const isRitual   = ing.layer === 'ritual';

      let cardCls = 'ingredient-card';
      if (isInSlot && !activeSlotId) cardCls += ' in-use';
      if (isWaste && isInSlot)       cardCls += ' waste';
      if (isDisabled)    cardCls += ' disabled';
      else if (activeSlotId) cardCls += ' selectable';

      // Tags
      const tags = [];
      if (!isRitual) {
        if (ing.force > 0)      tags.push('<span class="param-tag force">&#x1F6E1;&#xFE0F; +' + ing.force + '</span>');
        if (ing.precision > 0)  tags.push('<span class="param-tag precision">&#x26A1; +' + ing.precision + '</span>');
        if (ing.harm > 0)       tags.push('<span class="param-tag harm">&#x2620;&#xFE0F; вред +' + ing.harm + '</span>');
        if (ing.harm < 0)       tags.push('<span class="param-tag smooth">&#x1F33F; вред ' + ing.harm + '</span>');
        if (ing.smooth > 0)     tags.push('<span class="param-tag smooth">&#x1F49A; +' + ing.smooth + '</span>');
        if (ing.smooth < 0)     tags.push('<span class="param-tag smoothbad">&#x1F49A; ' + ing.smooth + '</span>');
        if (ing.collateralBase) tags.push('<span class="param-tag collateral">&#x1F3AF; залп +' + ing.collateralBase + '</span>');
      } else {
        // Ritual global effects
        if (ing.globalEffect) {
          const ge = ing.globalEffect;
          if (ge.smoothBonus)         tags.push('<span class="param-tag global">&#x1F49A; принятие +' + ge.smoothBonus + '</span>');
          if (ge.harmReduction)       tags.push('<span class="param-tag smooth">&#x1F33F; вред &minus;' + ge.harmReduction + '</span>');
          if (ge.collateralReduction) tags.push('<span class="param-tag smooth">&#x1F3AF; залп &minus;' + ge.collateralReduction + '</span>');
          if (ge.precisionBonus)      tags.push('<span class="param-tag precision">&#x26A1; +' + ge.precisionBonus + '</span>');
          if (ge.forceBonus)          tags.push('<span class="param-tag force">&#x1F6E1;&#xFE0F; +' + ge.forceBonus + '</span>');
          if (ge.smoothPenalty)       tags.push('<span class="param-tag smoothbad">&#x1F49A; &minus;' + ge.smoothPenalty + '</span>');
          if (ge.harmPenalty)         tags.push('<span class="param-tag harm">&#x2620;&#xFE0F; вред +' + ge.harmPenalty + '</span>');
        }
      }
      tags.push('<span class="param-tag gold">&#x1F4B0; ' + ing.gold + '</span>');

      // Action button
      let actionHtml = '';
      if (activeSlotId && !isDisabled) {
        const btnCls = isRitual ? 'btn-pick ritual' : 'btn-pick';
        actionHtml = '<button class="' + btnCls + '" data-ing="' + ing.id + '">Взять</button>';
      } else if (isDisabled && !canAfford) {
        actionHtml = '<span class="disabled-reason">Дорого</span>';
      } else if (isDisabled) {
        actionHtml = '<span class="disabled-reason">Уже в котле</span>';
      } else if (isInSlot && !activeSlotId) {
        actionHtml = '<span class="in-use-badge">&#x2713; В котле</span>';
      }

      const div = document.createElement('div');
      div.className  = cardCls;
      div.dataset.id = ing.id;

      if (isRitual) {
        div.innerHTML =
          '<div class="ritual-ing-top">&#x1F503; обёртка команды</div>' +
          '<div class="ing-content">' +
            '<div class="ing-header"><span class="ing-name">' + ing.name + '</span>' + actionHtml + '</div>' +
            '<div class="ing-desc">' + ing.desc + '</div>' +
            '<div class="ing-params">' + tags.join('') + '</div>' +
            '<div class="waste-badge">&#x26A0;&#xFE0F; Лишний &mdash; вклад меньше 10% от нужной оси</div>' +
          '</div>';
      } else {
        div.innerHTML =
          connBarHtml(ing.inputType, 'top') +
          '<div class="ing-content">' +
            '<div class="ing-header"><span class="ing-name">' + ing.name + '</span>' + actionHtml + '</div>' +
            '<div class="ing-desc">' + ing.desc + '</div>' +
            '<div class="ing-params">' + tags.join('') + '</div>' +
            '<div class="waste-badge">&#x26A0;&#xFE0F; Лишний &mdash; вклад меньше 10% от нужной оси</div>' +
          '</div>' +
          connBarHtml(ing.outputType, 'bottom');
      }

      col.appendChild(div);
    });

  col.querySelectorAll('.btn-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      slotFills[activeSlotId] = btn.dataset.ing;
      activeSlotId = null; isRitualPick = false;
      updateUI(true);
    });
  });

  col.querySelectorAll('.ingredient-card.selectable').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.btn-pick')) return;
      slotFills[activeSlotId] = card.dataset.id;
      activeSlotId = null; isRitualPick = false;
      updateUI(true);
    });
  });

  updateTabBadges();
}

// ======================================================================
// HELPERS
// ======================================================================

function updateTabBadges() {
  const inUseIds = new Set(Object.values(slotFills).filter(Boolean));
  ['stone', 'elixir', 'smoke', 'ritual'].forEach(layer => {
    const badge = document.getElementById('badge-' + layer);
    if (!badge) return;
    const count = INGREDIENTS.filter(i => i.layer === layer && inUseIds.has(i.id)).length;
    badge.textContent = count || '';
    badge.classList.toggle('visible', count > 0);
  });
}

function syncTabBar() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.layer === currentLayer);
  });
}

function hideResult() { document.getElementById('result-panel').className = 'result-panel'; }

function showResult(stats) {
  const result   = calcResult(stats);
  const s        = sc();
  const panel    = document.getElementById('result-panel');
  panel.className = 'result-panel show ' + (result.startsWith('partial') ? 'partial' : result);

  const titles = {
    success: '&#x2705; Зелье сварено удачно!', fail: '&#x1F480; Зелье не помогло',
    partial: '&#x26A0;&#xFE0F; Сработало, но с побочками',
    partial_collateral: '&#x26A0;&#xFE0F; Сработало, но задело своих'
  };
  document.getElementById('result-title').innerHTML = titles[result];

  let text = s.debrief[result] || s.debrief.partial || '';
  if (s.id === 'latency' && result !== 'fail') {
    const fSum = stats.filled.filter(({ing}) => ing && ing.force > 5).reduce((a, {ing}) => a + ing.force, 0);
    const pSum = stats.filled.filter(({ing}) => ing && ing.precision > 5).reduce((a, {ing}) => a + ing.precision, 0);
    const extra = fSum > pSum ? s.debrief.force_debrief : s.debrief.precision_debrief;
    if (extra) text += ' ' + extra;
  }
  document.getElementById('result-text').innerHTML = text;

  let ext = '';
  if (stats.penaltySlotIds.size > 0) ext += '<div><strong>&#x26A1; Конфликт порядка:</strong> мягкое вмешательство стоит перед агрессивным &mdash; &minus;30% мощи.</div>';
  const wastes = stats.filled.filter(({ing}) => ing && wasteIds.has(ing.id)).map(({ing}) => ing.name);
  if (wastes.length) ext += '<div><strong>&#x1F5D1;&#xFE0F; Лишнее:</strong> ' + wastes.join(', ') + ' &mdash; вклад в нужную ось меньше 10%.</div>';
  document.getElementById('result-extras').innerHTML = ext;
}

// ======================================================================
// MAIN LOOP
// ======================================================================

function updateUI(rerender) {
  const stats = calcStats();
  wasteIds    = calcWaste(stats);
  renderGold(stats);
  renderRitualZone(stats);
  renderSlots(stats);
  renderMeters(stats);
  if (rerender) renderIngredients(stats);
  else updateTabBadges();
}

function resetCauldron() {
  slotFills = {}; activeSlotId = null; isRitualPick = false; wasteIds = new Set();
  hideResult();
  updateUI(true);
}

// ======================================================================
// EVENTS
// ======================================================================

document.getElementById('btn-brew').addEventListener('click', () => {
  const stats = calcStats();
  const btn = document.getElementById('btn-brew');
  btn.textContent = '&#x1F300; Варится...';
  btn.disabled = true;
  setTimeout(() => {
    btn.innerHTML = '&#x2697; Сварить зелье';
    btn.disabled = false;
    showResult(stats);
    updateUI(true);
  }, 600);
});

document.getElementById('btn-reset').addEventListener('click', resetCauldron);

document.getElementById('btn-next').addEventListener('click', () => {
  currentScenarioIdx = (currentScenarioIdx + 1) % SCENARIOS.length;
  resetCauldron();
  renderQuest();
});

document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.classList.contains('tab-dimmed')) return;
  currentLayer = btn.dataset.layer;
  syncTabBar();
  updateUI(true);
});

// ======================================================================
// INIT
// ======================================================================

renderQuest();
updateUI(true);
</script>
</body>
</html>
