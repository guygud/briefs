<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зельевар Staff-инженера</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3247;
  --text: #e4e6f0;
  --muted: #7b82a0;
  --accent: #7c6af7;
  --success: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --gold-color: #f0a030;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
header h1 { font-size: 1.1rem; font-weight: 700; }
header .sub { font-size: .8rem; color: var(--muted); }
.scenario-switcher {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: .82rem;
  transition: background .15s, border-color .15s;
}
.btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 600;
}
.btn.primary:hover { opacity: .85; }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.btn.danger:hover { background: var(--danger); color: #fff; }
.scenario-idx { font-size: .8rem; color: var(--muted); }

main {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 320px;
  gap: 0;
  overflow: hidden;
}
.col {
  padding: 16px;
  overflow-y: auto;
  height: calc(100vh - 54px);
}
.col-left { border-right: 1px solid var(--border); }
.col-right { border-left: 1px solid var(--border); }

/* Quest card */
.quest-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}
.quest-badge {
  display: inline-block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: 8px;
}
.quest-requester { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.quest-story { font-size: .82rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
.quest-need {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  padding: 8px 10px;
  border-radius: 4px;
  font-size: .82rem;
  font-style: italic;
  margin-bottom: 10px;
}
.quest-hint {
  background: rgba(124,106,247,.1);
  border: 1px solid rgba(124,106,247,.3);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: .78rem;
  color: #a99ef7;
  line-height: 1.4;
}
.requires-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.require-chip {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.require-chip.met { border-color: var(--success); color: var(--success); }
.require-chip.unmet { border-color: var(--danger); color: var(--danger); }

/* Cauldron */
.cauldron-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.cauldron-title { font-weight: 700; font-size: .95rem; }
.gold-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(240,160,48,.12);
  border: 1px solid rgba(240,160,48,.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: .82rem;
  font-weight: 700;
  color: var(--gold-color);
}
.gold-badge.over { border-color: var(--danger); color: var(--danger); background: rgba(248,81,73,.12); }

.slots-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.slot-card {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .18s, opacity .18s;
  min-height: 80px;
  position: relative;
}
.slot-card:hover:not(.locked):not(.active-target) { border-color: var(--accent); }
.slot-card.locked {
  opacity: 0.35;
  cursor: not-allowed;
  pointer-events: none;
}
.slot-card.active-target {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(124,106,247,.25);
}
.slot-card.filled { border-color: var(--border); }
.slot-card.filled:hover:not(.locked) { border-color: #5a9ef8; }

.slot-header {
  background: var(--surface2);
  padding: 5px 8px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: .72rem;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.slot-header .slot-icon { font-size: .9rem; }
.slot-header .slot-label { font-weight: 600; flex: 1; }
.slot-header .slot-layers { font-size: .66rem; opacity: .7; }
.slot-lock { font-size: 1rem; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: .5; }

.slot-body {
  padding: 7px 8px;
  min-height: 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.slot-empty {
  font-size: .76rem;
  color: var(--muted);
  text-align: center;
}
.slot-ing-name {
  font-size: .8rem;
  font-weight: 600;
  margin-bottom: 3px;
  line-height: 1.3;
}
.slot-ing-effects {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.slot-ing-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: .8rem;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 4px;
}
.slot-ing-remove:hover { color: var(--danger); background: rgba(248,81,73,.12); }

/* Effect chips */
.effect-chip {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 1px 6px;
  border-radius: 12px;
  font-size: .7rem;
  font-weight: 700;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.effect-chip.shield    { border-color: #5a9ef8; color: #5a9ef8; }
.effect-chip.speed     { border-color: #f0c040; color: #f0c040; }
.effect-chip.insight   { border-color: #b08af7; color: #b08af7; }
.effect-chip.rollout   { border-color: #3fb950; color: #3fb950; }
.effect-chip.contract  { border-color: #f09050; color: #f09050; }
.effect-chip.simplicity{ border-color: #50d0d0; color: #50d0d0; }

/* Effects preview */
.effects-preview {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
  padding: 10px;
  background: var(--surface2);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.effects-preview-title {
  width: 100%;
  font-size: .72rem;
  color: var(--muted);
  margin-bottom: 4px;
}
.eff-req-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: .8rem;
  font-weight: 700;
  background: var(--bg);
  border: 1.5px solid var(--border);
}
.eff-req-chip.met    { border-color: var(--success); color: var(--success); }
.eff-req-chip.unmet  { border-color: var(--danger);  color: var(--danger);  }
.eff-req-chip .eff-val { font-size: .7rem; opacity: .8; }

/* Cauldron actions */
.cauldron-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.cauldron-actions .btn { flex: 1; text-align: center; }

/* Result panel */
#result-panel {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 10px;
}
.result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.result-icon { font-size: 2rem; }
.result-title { font-size: 1rem; font-weight: 700; }
.result-subtitle { font-size: .8rem; color: var(--muted); }
.event-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.event-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  border-radius: 7px;
  font-size: .85rem;
  font-weight: 600;
}
.event-row.good { background: rgba(63,185,80,.1);  color: #3fb950; }
.event-row.bad  { background: rgba(248,81,73,.1);   color: #f85149; }
.event-row.warn { background: rgba(240,160,48,.1);  color: #f0a030; }
.event-row .ev-icon { font-size: 1rem; }
.result-story {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.5;
  margin-bottom: 10px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 6px;
}
.waste-note {
  font-size: .78rem;
  color: var(--warn);
  padding: 6px 10px;
  background: rgba(210,153,34,.1);
  border-radius: 6px;
  margin-bottom: 10px;
}
.details-toggle {
  background: none;
  border: 1px dashed var(--border);
  color: var(--muted);
  border-radius: 6px;
  padding: 5px 12px;
  cursor: pointer;
  font-size: .8rem;
  width: 100%;
  transition: border-color .15s, color .15s;
}
.details-toggle:hover { border-color: var(--accent); color: var(--accent); }
#result-details {
  display: none;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.details-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.detail-item {
  background: var(--surface2);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: .78rem;
}
.detail-item .d-label { color: var(--muted); font-size: .7rem; margin-bottom: 2px; }
.detail-item .d-value { font-weight: 700; }
.detail-item .d-value.ok { color: var(--success); }
.detail-item .d-value.bad { color: var(--danger); }
.conflict-list { margin-top: 6px; }
.conflict-item {
  font-size: .76rem;
  color: var(--warn);
  padding: 4px 8px;
  background: rgba(210,153,34,.08);
  border-radius: 4px;
  margin-bottom: 3px;
}

/* Right col — ingredients */
.pick-mode-banner {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(124,106,247,.15);
  border: 1px solid rgba(124,106,247,.4);
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: .82rem;
}
.pick-mode-banner.visible { display: flex; }
.pick-cancel { margin-left: auto; background: none; border: none; color: var(--accent); cursor: pointer; font-size: .8rem; }

.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.tab-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: .78rem;
  color: var(--muted);
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tab-btn:hover { color: var(--text); border-color: var(--accent); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-btn.grayed { opacity: .4; pointer-events: none; }

.ing-list { display: flex; flex-direction: column; gap: 7px; }
.ing-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  cursor: pointer;
  transition: border-color .18s;
  position: relative;
}
.ing-card:hover { border-color: var(--accent); }
.ing-card.placed { border-color: #5a9ef8; opacity: .7; pointer-events: none; }
.ing-card.trap { border-color: rgba(248,81,73,.3); }
.ing-card .ing-name { font-size: .85rem; font-weight: 700; margin-bottom: 4px; }
.ing-card .ing-desc { font-size: .75rem; color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
.ing-card .ing-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.ing-card .ing-meta .gold-tag {
  background: rgba(240,160,48,.12);
  border: 1px solid rgba(240,160,48,.4);
  color: var(--gold-color);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: .7rem;
  font-weight: 700;
}
.ing-card .ing-meta .harm-tag {
  background: rgba(248,81,73,.1);
  border: 1px solid rgba(248,81,73,.3);
  color: #f85149;
  border-radius: 10px;
  padding: 1px 7px;
  font-size: .7rem;
  font-weight: 700;
}
.ing-card .ing-meta .adopt-tag {
  background: rgba(63,185,80,.1);
  border: 1px solid rgba(63,185,80,.3);
  color: #3fb950;
  border-radius: 10px;
  padding: 1px 7px;
  font-size: .7rem;
}
.ing-card .ing-meta .adopt-neg {
  background: rgba(210,153,34,.1);
  border: 1px solid rgba(210,153,34,.3);
  color: #d29922;
  border-radius: 10px;
  padding: 1px 7px;
  font-size: .7rem;
}
.ing-placed-label {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: .68rem;
  color: #5a9ef8;
  background: rgba(90,158,248,.1);
  border-radius: 4px;
  padding: 1px 5px;
}

/* Conflict warning on ingredient */
.ing-conflict-warn {
  font-size: .7rem;
  color: var(--warn);
  margin-top: 4px;
  display: none;
}
.ing-conflict-warn.show { display: block; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🧪</span>
  <div>
    <h1>Зельевар Staff-инженера</h1>
    <div class="sub">Выбери ингредиенты — свари зелье — реши задачу</div>
  </div>
  <div class="scenario-switcher">
    <span class="scenario-idx" id="scenario-idx">1 / 8</span>
    <button class="btn" id="btn-prev">◀ Назад</button>
    <button class="btn" id="btn-next">Вперёд ▶</button>
  </div>
</header>

<main>
  <!-- LEFT: Quest card -->
  <div class="col col-left" id="col-quest">
    <div class="quest-card" id="quest-card"><!-- rendered by JS --></div>
  </div>

  <!-- CENTER: Cauldron -->
  <div class="col col-center" id="col-cauldron">
    <div class="cauldron-header">
      <span class="cauldron-title">🫕 Котёл</span>
      <div class="gold-badge" id="gold-badge">💰 0 / 0</div>
    </div>

    <div class="slots-grid" id="slots-grid"><!-- rendered by JS --></div>

    <div class="effects-preview" id="effects-preview"><!-- rendered by JS --></div>

    <div class="cauldron-actions">
      <button class="btn primary" id="btn-brew">⚗️ Сварить зелье</button>
      <button class="btn danger" id="btn-reset">🗑 Сбросить</button>
    </div>

    <div id="result-panel"><!-- rendered by JS --></div>
  </div>

  <!-- RIGHT: Ingredients -->
  <div class="col col-right" id="col-ingredients">
    <div class="pick-mode-banner" id="pick-banner">
      <span id="pick-banner-text">Выбери ингредиент</span>
      <button class="pick-cancel" id="pick-cancel">✕ Отмена</button>
    </div>
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-layer="stone">🪨 Камни</button>
      <button class="tab-btn" data-layer="elixir">⚗️ Эликсиры</button>
      <button class="tab-btn" data-layer="smoke">💨 Дым</button>
      <button class="tab-btn" data-layer="ritual">🕯️ Ритуалы</button>
    </div>
    <div class="ing-list" id="ing-list"><!-- rendered by JS --></div>
  </div>
</main>

<script>
// ─── EFFECTS META ───────────────────────────────────────────────
const EFFECT_META = {
  shield:     { icon: '🛡', label: 'Защита',    cls: 'shield' },
  speed:      { icon: '⚡', label: 'Скорость',  cls: 'speed' },
  insight:    { icon: '🔭', label: 'Видимость', cls: 'insight' },
  rollout:    { icon: '🚀', label: 'Раскатка',  cls: 'rollout' },
  contract:   { icon: '📜', label: 'Контракт',  cls: 'contract' },
  simplicity: { icon: '🧹', label: 'Простота',  cls: 'simplicity' },
};

const LAYER_META = {
  stone:  { icon: '🪨', label: 'Камень' },
  elixir: { icon: '⚗️', label: 'Эликсир' },
  smoke:  { icon: '💨', label: 'Дым' },
  ritual: { icon: '🕯️', label: 'Ритуал' },
};

// ─── SLOT ROLES ─────────────────────────────────────────────────
const SLOT_ROLES = {
  foundation:  { label: 'Основа',       icon: '🏗️', allowedLayers: ['stone'] },
  catalyst:    { label: 'Катализатор',  icon: '⚗️', allowedLayers: ['elixir'] },
  stabilizer:  { label: 'Стабилизатор', icon: '⚖️', allowedLayers: ['elixir', 'smoke'] },
  filter:      { label: 'Фильтр',       icon: '🧹', allowedLayers: ['stone', 'elixir'] },
  observation: { label: 'Наблюдение',   icon: '🔭', allowedLayers: ['smoke'] },
  rollout:     { label: 'Раскатка',     icon: '🚀', allowedLayers: ['ritual'] },
};
const SLOT_ORDER = ['foundation', 'catalyst', 'stabilizer', 'filter', 'observation', 'rollout'];

// ─── INGREDIENTS ────────────────────────────────────────────────
const INGREDIENTS = [
  // ── STONE ──
  {
    id: 'rate_limit', layer: 'stone',
    name: '💧 Капли Rate Limit',
    desc: 'Ставим лимиты на запросы. Грубо, но надёжно. Птицы и фазаны не разбираются.',
    effectPower: { shield: 25 },
    adoption: -5, harm: 8, gold: 2, collateralBase: 6,
    conflicts: ['canary_dust'],
    conflictNote: 'Rate Limit фильтрует весь поток — Канарейке нечего делать на уже отсеянном трафике',
  },
  {
    id: 'ddos_screen', layer: 'stone',
    name: '🛡️ Дорогой DDoS-экран',
    desc: 'Большой экран, большой счёт. Зато надёжно и без вопросов.',
    effectPower: { shield: 40 },
    adoption: -2, harm: 3, gold: 12,
    conflicts: [],
  },
  {
    id: 'waf', layer: 'stone',
    name: '🔮 Руны WAF',
    desc: 'Магические правила фильтрации запросов. Немного токсично для честных пользователей.',
    effectPower: { shield: 20, contract: 10 },
    adoption: -4, harm: 7, gold: 8, collateralBase: 5,
    conflicts: ['canary_dust'],
    conflictNote: 'WAF переписывает заголовки — Канарейка не получит честную случайную выборку',
  },
  {
    id: 'cdn_shield', layer: 'stone',
    name: '🌐 Щит CDN',
    desc: 'Раздаём контент с края сети. Боты отсекаются на подлёте, живые ускоряются.',
    effectPower: { shield: 15, speed: 12 },
    adoption: 2, harm: 2, gold: 7,
    conflicts: [],
  },
  // ── ELIXIR ──
  {
    id: 'schema_validator', layer: 'elixir',
    name: '📜 Свиток Валидации',
    desc: 'Проверяем формат данных на входе. Кривые схемы не проходят дальше.',
    effectPower: { contract: 30 },
    adoption: 3, harm: 1, gold: 5,
    conflicts: ['cache_powder'],
    conflictNote: 'Кеш возвращает данные без проверки схемы — контракт может нарушиться тихо',
  },
  {
    id: 'cache_powder', layer: 'elixir',
    name: '🫙 Порошок Кеширования',
    desc: 'Кешируем ответы. Быстро, но может протухнуть. Схему не проверяет.',
    effectPower: { speed: 18 },
    adoption: 0, harm: 5, gold: 5,
    conflicts: ['schema_validator'],
    conflictNote: 'Кеш может вернуть данные старой схемы — нарушает контракт незаметно',
  },
  {
    id: 'queue_tuner', layer: 'elixir',
    name: '🧵 Перо Настройки Очередей',

// ─── STATE ──────────────────────────────────────────────────────
let scenarioIdx = 0;
let slotFills = {};      // roleId → ingredient id
let activeSlotId = null; // roleId being picked
let currentLayer = 'stone';

// ─── HELPERS ────────────────────────────────────────────────────
const sc  = () => SCENARIOS[scenarioIdx];
const ing = id => INGREDIENTS.find(i => i.id === id);
const placedIds = () => new Set(Object.values(slotFills).filter(Boolean));

// ─── CALC STATS ─────────────────────────────────────────────────
function calcStats() {
  const s = sc();
  const effects  = { shield:0, speed:0, insight:0, rollout:0, contract:0, simplicity:0 };
  let totalHarm = 0, totalAdoption = 0, totalCollateral = 0, totalGold = 0;

  // Collect all placed ingredients
  const placed = s.activeSlots
    .map(roleId => ({ roleId, i: ing(slotFills[roleId]) }))
    .filter(x => x.i);

  // Find conflict pairs
  const conflictPairs = [];
  const conflictIds = new Set();
  for (const { i: a } of placed) {
    for (const { i: b } of placed) {
      if (a.id === b.id) continue;
      if ((a.conflicts || []).includes(b.id)) {
        const key = [a.id, b.id].sort().join('|');
        if (!conflictPairs.find(p => p.key === key)) {
          conflictPairs.push({ key, a: a.id, b: b.id, note: a.conflictNote || b.conflictNote || '' });
          conflictIds.add(a.id);
          conflictIds.add(b.id);
        }
      }
    }
  }

  // Accumulate
  for (const { i } of placed) {
    const penalty = conflictIds.has(i.id) ? 0.7 : 1.0;
    totalGold       += i.gold || 0;
    totalHarm       += i.harm || 0;
    totalAdoption   += i.adoption || 0;
    totalCollateral += i.collateralBase || 0;
    for (const [eff, val] of Object.entries(i.effectPower || {})) {
      effects[eff] = (effects[eff] || 0) + Math.round(val * penalty);
    }
  }

  totalHarm       = Math.max(0, totalHarm);
  totalCollateral = Math.max(0, totalCollateral);
  const adoptionPct = Math.min(100, Math.max(0, 60 + totalAdoption));

  return { effects, totalHarm, totalAdoption, adoptionPct, totalCollateral, totalGold, conflictPairs, placed };
}

// ─── CALC RESULT ────────────────────────────────────────────────
function calcResult(stats) {
  const s = sc();

  const effectsMet = Object.entries(s.requires).every(
    ([eff, need]) => (stats.effects[eff] || 0) >= need
  );

  const overBudget = stats.totalGold > s.goldBudget;
  const isFinal    = s.id === 'final';

  // Hard budget block on tasks 1-7; soft (hurtAllies) on final
  const solved = effectsMet && (isFinal || !overBudget);

  const hurtAlliesBase =
    stats.totalHarm > s.harmLimit ||
    (s.collateralLimit < 999 && stats.totalCollateral > s.collateralLimit);

  const teamUnhappy = stats.adoptionPct < (s.teamHappyMin || 50);

  // Waste: skip ritual layer and rollout slot (they improve adoption/safety, not effects)
  const requiredEffects = Object.keys(s.requires);
  const wasteIds = stats.placed
    .filter(({ roleId, i }) => {
      if (roleId === 'rollout' || i.layer === 'ritual') return false;
      const contribs = Object.entries(i.effectPower || {})
        .filter(([eff, v]) => v > 0 && requiredEffects.includes(eff));
      return contribs.length === 0;
    })
    .map(({ i }) => i.id);

  // requiredSlots soft rule: if a mandated slot is empty → force partial
  const emptyRequired = (s.requiredSlots || []).filter(roleId => !slotFills[roleId]);
  const forcedPartial  = solved && emptyRequired.length > 0;

  const hurtAllies = hurtAlliesBase || (isFinal && overBudget) || forcedPartial;

  return { solved, hurtAllies, teamUnhappy, wasteIds, overBudget, emptyRequired };
}

// ─── RENDER QUEST ───────────────────────────────────────────────
function renderQuest() {
  const s = sc();
  const stats = calcStats();
  const reqChips = Object.entries(s.requires).map(([eff, need]) => {
    const m = EFFECT_META[eff];
    const cur = stats.effects[eff] || 0;
    const met = cur >= need;
    return `<span class="require-chip ${met ? 'met' : 'unmet'}">${m.icon} ${m.label} ${need}</span>`;
  }).join('');

  document.getElementById('quest-card').innerHTML = `
    <div class="quest-badge">${s.badgeText}</div>
    <div class="quest-requester">${s.requester}</div>
    <div class="quest-story">${s.story}</div>
    <div class="quest-need">${s.need}</div>
    <div class="requires-row">${reqChips}</div>
    <div class="quest-hint">${s.hint}</div>
  `;
}

  const s = sc();
  const over = stats.totalGold > s.goldBudget;
  const el = document.getElementById('gold-badge');
  el.textContent = `💰 ${stats.totalGold} / ${s.goldBudget}`;
  el.className = 'gold-badge' + (over ? ' over' : '');
}

// ─── RENDER SLOTS ───────────────────────────────────────────────
function renderSlots() {
  const s = sc();
  const activeSet = new Set(s.activeSlots);

  const html = SLOT_ORDER.map(roleId => {
    const role   = SLOT_ROLES[roleId];
    const locked = !activeSet.has(roleId);
    const filledId = slotFills[roleId];
    const filled = filledId ? ing(filledId) : null;
    const isTarget = (activeSlotId === roleId);
    const layerLabels = role.allowedLayers.map(l => LAYER_META[l].icon).join(' ');

    let bodyHtml;
    if (locked) {
      bodyHtml = `<div class="slot-body"><div class="slot-empty">—</div></div><div class="slot-lock">🔒</div>`;
    } else if (filled) {
      const effBadges = Object.entries(filled.effectPower || {})
        .filter(([, v]) => v > 0)
        .map(([eff, v]) => {
          const m = EFFECT_META[eff];
          return `<span class="effect-chip ${m.cls}">${m.icon} ${v}</span>`;
        }).join('');
      bodyHtml = `
        <div class="slot-body">
          <div class="slot-ing-name">${filled.name}</div>
          <div class="slot-ing-effects">${effBadges || '<span style="font-size:.7rem;color:var(--muted)">нет эффектов</span>'}</div>
        </div>
        <button class="slot-ing-remove" data-role="${roleId}" title="Убрать">✕</button>
      `;
    } else {
      bodyHtml = `<div class="slot-body"><div class="slot-empty">+ нажми чтобы добавить</div></div>`;
    }

    return `
      <div class="slot-card ${locked ? 'locked' : ''} ${isTarget ? 'active-target' : ''} ${filled && !locked ? 'filled' : ''}"
           data-role="${roleId}" ${locked ? '' : 'onclick="onSlotClick(event, \'' + roleId + '\')"'}>
        <div class="slot-header">
          <span class="slot-icon">${role.icon}</span>
          <span class="slot-label">${role.label}</span>
          <span class="slot-layers">${layerLabels}</span>
        </div>
        ${bodyHtml}
      </div>
    `;
  }).join('');

  document.getElementById('slots-grid').innerHTML = html;

  // Remove button listeners
  document.querySelectorAll('.slot-ing-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const roleId = btn.dataset.role;
      slotFills[roleId] = null;
      updateUI(false);
    });
  });
}

  const activeSet = new Set(s.activeSlots);
  const placed = placedIds();
  const role = activeSlotId ? SLOT_ROLES[activeSlotId] : null;
  const allowedLayers = role ? new Set(role.allowedLayers) : null;

  const filtered = INGREDIENTS.filter(i => i.layer === currentLayer);

  const html = filtered.map(i => {
    const isPlaced = placed.has(i.id);
    // In pick mode, check layer compatibility
    const incompatible = allowedLayers && !allowedLayers.has(i.layer);
    if (incompatible) return '';

    // Check for active conflicts (with currently placed ingredients)
    const hasConflict = (i.conflicts || []).some(cid => placed.has(cid));
    const conflictWith = hasConflict
      ? (i.conflicts || []).filter(cid => placed.has(cid)).map(cid => ing(cid)?.name || cid).join(', ')
      : null;

    const effBadges = Object.entries(i.effectPower || {})
      .filter(([, v]) => v > 0)
      .map(([eff, v]) => {
        const m = EFFECT_META[eff];
        return `<span class="effect-chip ${m.cls}">${m.icon} +${v}</span>`;
      }).join('');

    const adoptTag = i.adoption > 0
      ? `<span class="adopt-tag">😊 +${i.adoption}</span>`
      : i.adoption < 0
        ? `<span class="adopt-neg">😑 ${i.adoption}</span>`
        : '';
    const harmTag = (i.harm || 0) > 0 ? `<span class="harm-tag">⚠️ вред ${i.harm}</span>` : '';
    const goldTag = `<span class="gold-tag">💰 ${i.gold}</span>`;

    const isTrap = Object.keys(i.effectPower || {}).length === 0;

    return `
      <div class="ing-card ${isPlaced ? 'placed' : ''} ${isTrap ? 'trap' : ''}"
           data-id="${i.id}" ${isPlaced ? '' : 'onclick="onIngClick(\'' + i.id + '\')"'}>
        ${isPlaced ? `<span class="ing-placed-label">В котле</span>` : ''}
        <div class="ing-name">${i.name}</div>
        <div class="ing-desc">${i.desc}</div>
        <div class="ing-meta">
          ${effBadges || '<span style="font-size:.7rem;color:var(--muted)">нет эффектов</span>'}
          ${goldTag}${harmTag}${adoptTag}
        </div>
        ${hasConflict ? `<div class="ing-conflict-warn show">⚡ Конфликт с: ${conflictWith}</div>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('ing-list').innerHTML = html || '<div style="color:var(--muted);font-size:.8rem;padding:10px">Нет подходящих ингредиентов для этого слота</div>';
}

// ─── PICK MODE BANNER ───────────────────────────────────────────
function renderPickBanner() {
  const banner = document.getElementById('pick-banner');
  if (activeSlotId) {
    const role = SLOT_ROLES[activeSlotId];
    const layerIcons = role.allowedLayers.map(l => LAYER_META[l].icon + ' ' + LAYER_META[l].label).join(', ');
    document.getElementById('pick-banner-text').textContent =
      `${role.icon} Выбираешь для слота «${role.label}» · допустимо: ${layerIcons}`;
    banner.classList.add('visible');

    // Highlight compatible tabs; gray out others
    document.querySelectorAll('.tab-btn').forEach(btn => {
      const l = btn.dataset.layer;
      const ok = role.allowedLayers.includes(l);
      btn.classList.toggle('grayed', !ok);
      if (!ok && btn.classList.contains('active')) {
        // switch to first allowed tab
        const firstAllowed = role.allowedLayers[0];
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.tab-btn[data-layer="${firstAllowed}"]`).classList.add('active');
        currentLayer = firstAllowed;
      }
    });
  } else {
    banner.classList.remove('visible');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('grayed'));
  }
}

// ─── SHOW RESULT ────────────────────────────────────────────────
function showResult() {
  const stats  = calcStats();
  const result = calcResult(stats);
  const s = sc();

  const { solved, hurtAllies, teamUnhappy, wasteIds, overBudget, emptyRequired } = result;

  // Choose debrief text (teamUnhappy also counts as partial)
  let debriefText;
  if (!solved)                        debriefText = s.debrief.fail;
  else if (hurtAllies || teamUnhappy) debriefText = s.debrief.partial;
  else                                debriefText = s.debrief.success;

  // Main icon (teamUnhappy also downgrades to partial)
  let mainIcon, mainTitle;
  if (!solved)                        { mainIcon = '💀'; mainTitle = 'Задача не выполнена'; }
  else if (hurtAllies || teamUnhappy) { mainIcon = '⚠️'; mainTitle = 'Частичный успех'; }
  else                                { mainIcon = '🏆'; mainTitle = 'Успех!'; }

  // Event rows
  const solvedRow = solved
    ? `<div class="event-row good"><span class="ev-icon">✅</span> Задача решена</div>`
    : overBudget
      ? `<div class="event-row bad"><span class="ev-icon">❌</span> Задача не выполнена — бюджет превышен (${stats.totalGold} > ${s.goldBudget} 💰)</div>`
      : `<div class="event-row bad"><span class="ev-icon">❌</span> Задача не решена — эффектов не хватило</div>`;

  const alliesRow = hurtAllies
    ? `<div class="event-row bad"><span class="ev-icon">💔</span> Задело своих — побочный ущерб слишком высок</div>`
    : `<div class="event-row good"><span class="ev-icon">💚</span> Своих не задело</div>`;

  const teamRow = teamUnhappy
    ? `<div class="event-row warn"><span class="ev-icon">😑</span> Команда недовольна — слишком много боли при внедрении</div>`
    : `<div class="event-row good"><span class="ev-icon">😊</span> Команда приняла зелье</div>`;

  const budgetRow = overBudget && solved
    ? `<div class="event-row warn"><span class="ev-icon">💸</span> Бюджет превышен (${stats.totalGold} > ${s.goldBudget} 💰) — в финале это сошло с рук</div>`
    : '';

  const requiredSlotRow = emptyRequired.length > 0
    ? `<div class="event-row warn"><span class="ev-icon">🔒</span> ${s.requiredNote || 'Ключевой слот пуст — максимум частичный успех'}</div>`
    : '';

  // Waste note
  const wasteHtml = wasteIds.length > 0
    ? `<div class="waste-note">🗑 Лишние ингредиенты (не дают нужного эффекта): ${wasteIds.map(id => ing(id)?.name || id).join(', ')}</div>`
    : '';

  // Conflicts
  const conflictHtml = stats.conflictPairs.length > 0
    ? `<div class="conflict-list">
        ${stats.conflictPairs.map(p =>
          `<div class="conflict-item">⚡ Конфликт: ${ing(p.a)?.name} + ${ing(p.b)?.name}${p.note ? ' — ' + p.note : ''}</div>`
        ).join('')}
       </div>`
    : '';

  // Details
  const requiredSet = new Set(Object.keys(s.requires));
  const effDetailRows = Object.entries(stats.effects)
    .filter(([eff, v]) => v > 0 || requiredSet.has(eff))
    .map(([eff, v]) => {
      const m = EFFECT_META[eff];
      const need = s.requires[eff];
      const ok = !need || v >= need;
      return `<div class="detail-item"><div class="d-label">${m.icon} ${m.label}</div><div class="d-value ${ok ? 'ok' : 'bad'}">${v}${need ? ' / ' + need : ''}</div></div>`;
    });

  document.getElementById('result-panel').innerHTML = `
    <div class="result-header">
      <div class="result-icon">${mainIcon}</div>
      <div>
        <div class="result-title">${mainTitle}</div>
        <div class="result-subtitle">${s.requester}</div>
      </div>
    </div>
    <div class="event-rows">
      ${solvedRow}
      ${alliesRow}
      ${teamRow}
      ${budgetRow}
      ${requiredSlotRow}
    </div>
    ${wasteHtml}
    ${conflictHtml}
    <div class="result-story">${debriefText}</div>
    <button class="details-toggle" onclick="toggleDetails()">▾ Показать детали (числа)</button>
    <div id="result-details">
      <div class="details-grid">
        <div class="detail-item">
          <div class="d-label">Вред / лимит</div>
          <div class="d-value ${stats.totalHarm > s.harmLimit ? 'bad' : 'ok'}">${stats.totalHarm} / ${s.harmLimit}</div>
        </div>
        <div class="detail-item">
          <div class="d-label">Принятие команды</div>
          <div class="d-value ${stats.adoptionPct < s.teamHappyMin ? 'bad' : 'ok'}">${stats.adoptionPct}%</div>
        </div>
        ${s.collateralLimit < 999 ? `<div class="detail-item"><div class="d-label">Залп по своим / лимит</div><div class="d-value ${stats.totalCollateral > s.collateralLimit ? 'bad' : 'ok'}">${stats.totalCollateral} / ${s.collateralLimit}</div></div>` : ''}
        <div class="detail-item">
          <div class="d-label">Стоимость / бюджет</div>
          <div class="d-value ${stats.totalGold > s.goldBudget ? 'bad' : 'ok'}">${stats.totalGold} / ${s.goldBudget} 💰</div>
        </div>
        ${effDetailRows.join('')}
      </div>
    </div>
  `;

  document.getElementById('result-panel').style.display = 'block';
}

function toggleDetails() {
  const el = document.getElementById('result-details');
  const btn = document.querySelector('.details-toggle');
  const visible = el.style.display !== 'none' && el.style.display !== '';
  el.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? '▾ Показать детали (числа)' : '▴ Скрыть детали';
}

function hideResult() {
  const el = document.getElementById('result-panel');
  el.style.display = 'none';
  el.innerHTML = '';
}

// ─── EVENT HANDLERS ─────────────────────────────────────────────
function onSlotClick(e, roleId) {
  e.stopPropagation();
  if (activeSlotId === roleId) {
    // cancel pick mode
    activeSlotId = null;
  } else {
    activeSlotId = roleId;
    const role = SLOT_ROLES[roleId];
    // auto-switch tab to first allowed layer
    if (!role.allowedLayers.includes(currentLayer)) {
      currentLayer = role.allowedLayers[0];
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.tab-btn[data-layer="${currentLayer}"]`).classList.add('active');
    }
  }
  updateUI(false);
}

function onIngClick(id) {
  if (!activeSlotId) return;

  const role = SLOT_ROLES[activeSlotId];
  const i = ing(id);
  if (!role.allowedLayers.includes(i.layer)) return;

  slotFills[activeSlotId] = id;
  activeSlotId = null;

  updateUI(false);
}

// ─── UPDATE UI ──────────────────────────────────────────────────
function updateUI(showBrew) {
  const stats = calcStats();
  renderQuest();
  renderGold(stats);
  renderSlots();
  renderEffectsPreview(stats);
  renderPickBanner();
  renderIngredients();
  if (!showBrew) hideResult();
}

// ─── INIT SCENARIO ──────────────────────────────────────────────
function initScenario() {
  slotFills = {};
  activeSlotId = null;
  currentLayer = 'stone';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-layer="stone"]').classList.add('active');
  const total = SCENARIOS.length;
  document.getElementById('scenario-idx').textContent = `${scenarioIdx + 1} / ${total}`;
  updateUI(false);
}

// ─── BOOT ───────────────────────────────────────────────────────
document.getElementById('btn-brew').addEventListener('click', () => {
  activeSlotId = null;
  showResult();
  renderSlots();
  renderPickBanner();
  renderIngredients();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  slotFills = {};
  activeSlotId = null;
  updateUI(false);
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (scenarioIdx < SCENARIOS.length - 1) { scenarioIdx++; initScenario(); }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (scenarioIdx > 0) { scenarioIdx--; initScenario(); }
});

document.getElementById('pick-cancel').addEventListener('click', () => {
  activeSlotId = null;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('grayed'));
  updateUI(false);
});

document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.classList.contains('grayed')) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLayer = btn.dataset.layer;
  renderIngredients();
});

// Close pick mode when clicking outside
document.addEventListener('click', e => {
  if (!activeSlotId) return;
  const inCauldron = e.target.closest('#col-cauldron');
  const inIngList  = e.target.closest('#col-ingredients');
  if (!inCauldron && !inIngList) {
    activeSlotId = null;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('grayed'));
    updateUI(false);
  }
});

initScenario();
</script>
</body>
</html>
