<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Зельевар Staff-инженера</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
      --orange: #ff961e;
      --radius: 10px;
      --font: 'Manrope', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      padding: 20px 24px 0;
      display: flex;
      align-items: baseline;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p  { font-size: 0.85rem; color: var(--muted); }

    .game-layout {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 16px;
      padding: 16px 24px 40px;
      min-height: calc(100vh - 60px);
    }

    @media (max-width: 900px) {
      .game-layout { grid-template-columns: 1fr; }
    }

    /* ---- Generic card ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .col-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ---- Quest column ---- */
    .quest-card { position: sticky; top: 16px; }

    .quest-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .quest-badge.ddos    { background: rgba(248,81,73,0.15); color: var(--danger); border: 1px solid rgba(248,81,73,0.4); }
    .quest-badge.latency { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.4); }

    .quest-requester { font-size: 1rem; font-weight: 600; margin-bottom: 10px; }
    .quest-story     { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }

    .quest-needs {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
    }
    .quest-needs strong { display: block; color: var(--text); margin-bottom: 6px; }

    .quest-need-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      padding: 2px 0;
    }
    .quest-need-row span:last-child { color: var(--text); font-weight: 500; }

    .btn-next {
      margin-top: 16px; width: 100%; padding: 10px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: var(--font); font-size: 0.9rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .btn-next:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- Cauldron column ---- */
    .cauldron-col { display: flex; flex-direction: column; gap: 14px; }

    .cauldron-visual {
      text-align: center; font-size: 4rem;
      padding: 16px 0 8px; transition: transform 0.3s;
    }
    .cauldron-visual.brewing { animation: brew 0.5s ease-in-out; }

    @keyframes brew {
      0%   { transform: scale(1) rotate(0deg); }
      25%  { transform: scale(1.1) rotate(-5deg); }
      50%  { transform: scale(1.15) rotate(5deg); }
      75%  { transform: scale(1.05) rotate(-3deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .meter-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .meter-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); }
    .meter-label span:last-child { color: var(--text); font-weight: 600; }

    .meter-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
    .meter-fill  { height: 100%; border-radius: 4px; transition: width 0.3s ease; }

    .meter-fill.gold       { background: var(--warn); }
    .meter-fill.harm       { background: var(--danger); }
    .meter-fill.smooth     { background: var(--success); }
    .meter-fill.force      { background: #a371f7; }
    .meter-fill.precision  { background: var(--accent); }
    .meter-fill.collateral { background: var(--orange); }

    .meter-limit-line {
      position: absolute; top: 0; height: 100%; width: 2px;
      background: rgba(255,255,255,0.5);
    }

    .cauldron-actions { display: flex; gap: 10px; margin-top: 4px; }

    .btn-brew {
      flex: 1; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-family: var(--font); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-brew:hover  { background: #79b8ff; }
    .btn-brew:active { transform: scale(0.97); }

    .btn-reset {
      padding: 12px 18px; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: var(--font); font-size: 0.9rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .btn-reset:hover { border-color: var(--danger); color: var(--danger); }

    /* ---- Result panel ---- */
    .result-panel { display: none; border-radius: var(--radius); padding: 18px; animation: fadeIn 0.3s ease; }
    .result-panel.show { display: block; }
    .result-panel.success { background: rgba(63,185,80,0.1);  border: 1px solid rgba(63,185,80,0.4); }
    .result-panel.partial { background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.4); }
    .result-panel.fail    { background: rgba(248,81,73,0.1);  border: 1px solid rgba(248,81,73,0.4); }

    .result-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .result-panel.success .result-title { color: var(--success); }
    .result-panel.partial .result-title { color: var(--warn); }
    .result-panel.fail    .result-title { color: var(--danger); }

    .result-text   { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
    .result-extras { font-size: 0.8rem; color: var(--muted); }
    .result-extras strong { color: var(--warn); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Ingredients column ---- */

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tab-btn {
      flex: 1;
      padding: 7px 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      text-align: center;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .tab-badge {
      display: none;
      background: var(--success);
      color: #fff;
      border-radius: 10px;
      padding: 0 5px;
      font-size: 0.65rem;
      font-weight: 700;
      margin-left: 4px;
    }
    .tab-badge.visible { display: inline; }

    .ingredients-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      max-height: calc(100vh - 130px);
    }

    .ingredient-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      transition: border-color 0.2s;
    }
    .ingredient-card.active     { border-color: var(--accent); }
    .ingredient-card.waste      { border-color: var(--warn); opacity: 0.8; }
    .ingredient-card.overdosing { border-color: var(--orange); }

    .ing-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .ing-name { font-size: 0.9rem; font-weight: 600; }

    .drops-control { display: flex; align-items: center; gap: 8px; }
    .drops-btn {
      width: 26px; height: 26px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .drops-btn:hover { background: var(--surface); border-color: var(--accent); }
    .drops-val { font-size: 1rem; font-weight: 700; min-width: 18px; text-align: center; color: var(--accent); }

    .ing-desc   { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
    .ing-params { display: flex; flex-wrap: wrap; gap: 5px; }

    .param-tag {
      font-size: 0.7rem; padding: 2px 8px;
      border-radius: 20px; background: var(--surface2); color: var(--muted);
    }
    .param-tag.force      { background: rgba(163,113,247,0.15); color: #a371f7; }
    .param-tag.precision  { background: rgba(88,166,255,0.15);  color: var(--accent); }
    .param-tag.harm       { background: rgba(248,81,73,0.15);   color: var(--danger); }
    .param-tag.smooth     { background: rgba(63,185,80,0.15);   color: var(--success); }
    .param-tag.smoothbad  { background: rgba(210,153,34,0.15);  color: var(--warn); }
    .param-tag.gold       { background: rgba(210,153,34,0.1);   color: var(--warn); }
    .param-tag.overdose   { background: rgba(255,150,30,0.15);  color: var(--orange); }

    .waste-badge    { display: none; font-size: 0.7rem; color: var(--warn); margin-top: 4px; }
    .overdose-warn  { display: none; font-size: 0.7rem; color: var(--orange); margin-top: 4px; }
    .ingredient-card.waste      .waste-badge   { display: block; }
    .ingredient-card.overdosing .overdose-warn { display: block; }
  </style>
</head>
<body>

<header>
  <h1>🧪 Зельевар Staff-инженера</h1>
  <p>Составь зелье. Не убей пациента. Сдай задачу.</p>
</header>

<div class="game-layout">

  <!-- Левая колонка: Просьба -->
  <div>
    <div class="col-label">Просьба</div>
    <div class="card quest-card">
      <span class="quest-badge" id="quest-badge"></span>
      <div class="quest-requester" id="quest-requester"></div>
      <div class="quest-story" id="quest-story"></div>
      <div class="quest-needs">
        <strong>Что нужно зелью:</strong>
        <div id="quest-needs-list"></div>
      </div>
      <button class="btn-next" id="btn-next">Следующая просьба →</button>
    </div>
  </div>

  <!-- Средняя колонка: Котёл -->
  <div class="cauldron-col">
    <div class="col-label">Котёл</div>
    <div class="card">
      <div class="cauldron-visual" id="cauldron-visual">🫧</div>
      <div id="meters"></div>
      <div class="cauldron-actions">
        <button class="btn-brew" id="btn-brew">Сварить зелье</button>
        <button class="btn-reset" id="btn-reset">Сброс</button>
      </div>
    </div>
    <div class="result-panel" id="result-panel">
      <div class="result-title" id="result-title"></div>
      <div class="result-text"  id="result-text"></div>
      <div class="result-extras" id="result-extras"></div>
    </div>
  </div>

  <!-- Правая колонка: Ингредиенты -->
  <div>
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-layer="stone">🪨 Камни <span class="tab-badge" id="badge-stone"></span></button>
      <button class="tab-btn" data-layer="elixir">🧪 Эликсиры <span class="tab-badge" id="badge-elixir"></span></button>
      <button class="tab-btn" data-layer="smoke">💨 Дым <span class="tab-badge" id="badge-smoke"></span></button>
      <button class="tab-btn" data-layer="ritual">🕯️ Ритуалы <span class="tab-badge" id="badge-ritual"></span></button>
    </div>
    <div class="ingredients-col" id="ingredients-col"></div>
  </div>

</div>

<script>
  // ===== ДАННЫЕ =====

  // layer: stone (периметр/инфраструктура) | elixir (внутри сервиса) |
  //        smoke (наблюдение) | ritual (процессы команды)
  //
  // Параметры: gold (стоимость), harm (вред, растёт квадратично), smooth (гладкость/принятие),
  //            force (мощь против DDoS), precision (мощь против латентности)
  //
  // overdose: если drops > threshold — начинает расти collateral ("залп по своим")

  const INGREDIENTS = [
    {
      id: 'rate_limit', layer: 'stone',
      name: '💧 Капли Rate Limit',
      desc: 'Ставим лимиты на запросы. Работает грубо, но надёжно. Птицы и фазаны не разбираются.',
      gold: 2, harm: 8, smooth: -5, force: 25, precision: 0,
      overdose: { threshold: 1, collateral: 12 }
    },
    {
      id: 'ddos_screen', layer: 'stone',
      name: '🛡️ Дорогой DDoS-экран',
      desc: 'Большой экран, большой счёт. Прайс-лист толще птичьей стаи.',
      gold: 20, harm: 3, smooth: -2, force: 40, precision: 0
    },
    {
      id: 'waf_rune', layer: 'stone',
      name: '🔮 Руны WAF',
      desc: 'Магические правила фильтрации. Иногда задерживают нужные письма, зато красиво.',
      gold: 8, harm: 7, smooth: -4, force: 20, precision: 5,
      overdose: { threshold: 1, collateral: 8 }
    },
    {
      id: 'cache_powder', layer: 'elixir',
      name: '🫙 Порошок Кеширования',
      desc: 'Кешируем всё. Может протухнуть — зато быстро. Иногда.',
      gold: 5, harm: 6, smooth: 0, force: 15, precision: 18
    },
    {
      id: 'queue_tuner', layer: 'elixir',
      name: '🧵 Перо Настройки Очередей',
      desc: 'Тонкая настройка тайм-аутов и пулов потоков. Нудно, но помогает.',
      gold: 5, harm: 2, smooth: 3, force: 0, precision: 24
    },
    {
      id: 'observability', layer: 'smoke',
      name: '🔭 Свиток Наблюдения',
      desc: 'Метрики, дашборд, алерты. Не чинит, но мы хотя бы знаем что сломалось.',
      gold: 6, harm: 1, smooth: 8, force: 0, precision: 22
    },
    {
      id: 'tracing', layer: 'smoke',
      name: '🔷 Кристалл Трейсинга',
      desc: 'Каждый запрос оставляет след. Узкое место найдём точно.',
      gold: 7, harm: 1, smooth: 2, force: 2, precision: 28
    },
    {
      id: 'metrics', layer: 'smoke',
      name: '⚡ Громоотвод Метрик',
      desc: 'Гистограммы латентности. P99 теперь виден невооружённым глазом.',
      gold: 4, harm: 0, smooth: 6, force: 0, precision: 18
    },
    {
      id: 'feature_flag', layer: 'ritual',
      name: '🕯️ Свеча Фиче-Флага',
      desc: 'Можно всё откатить одной рукой. Команда счастлива. Мощь ~ 0.',
      gold: 2, harm: -1, smooth: 12, force: 1, precision: 2
    },
    {
      id: 'canary_dust', layer: 'ritual',
      name: '🐤 Канареечная Пыль',
      desc: '5% пользователей идут первыми. Если упало — откатили, канарейку не заметили.',
      gold: 3, harm: -2, smooth: 10, force: 0, precision: 3
    },
    {
      id: 'reactor_dust', layer: 'ritual',
      name: '💨 Пыль Бессмысленного Реактора',
      desc: 'Переписать на Rust? Звучит круто. Эффекта ноль, дедлайн сорван.',
      gold: 15, harm: 10, smooth: -8, force: 2, precision: 1
    },
    {
      id: 'blockchain', layer: 'ritual',
      name: '⛓️ Кристалл Блокчейна',
      desc: 'Добавляет серьёзности и непредсказуемости в равных пропорциях.',
      gold: 18, harm: 12, smooth: -10, force: 0, precision: 0
    }
  ];

  const SCENARIOS = [
    {
      id: 'ddos',
      axis: 'force',
      axisLabel: '🛡️ Сила (защита от DDoS)',
      badge: 'ddos',
      badgeText: 'DDoS-атака',
      requester: '🐦 Птицелов Мирон',
      story: 'Мирон ловит жирных фазанов на поляне Высокой Нагрузки. Но тут прилетают вороны — тысячи ворон — и мешают сетям летать. Жертв нет, но фазаны недоступны.',
      need: '«Нужно прогнать ворон. Сеть должна дышать. Бюджет не резиновый.»',
      needForce: 60, needPrecision: 0,
      harmLimit: 18, collateralLimit: 10,
      costHint: 25,
      debrief: {
        success:             '🎉 Вороны рассеялись. Фазаны пойманы. Мирон доволен и прислал корзину с перепёлками.',
        partial:             '⚠️ Вороны отступили, но зелье токсично: два фазана сбежали, команда жалуется на побочки.',
        partial_collateral:  '⚠️ Вороны прогнаны, но вместе с ними разбежались и фазаны: Rate Limit не разбирает своих от чужих.',
        fail:                '💀 Вороны не заметили зелья. Фазаны в панике. Мирон требует постмортем.'
      }
    },
    {
      id: 'latency',
      axis: 'precision',
      axisLabel: '⚡ Точность (снижение латентности)',
      badge: 'latency',
      badgeText: 'Высокая латентность',
      requester: '🏹 Иван-царевич',
      story: 'Иван шлёт стрелы-письма царевне-лягушке на болото. Стрелы летят... и зависают в воздухе на p99. Царевна думает, Иван молчит. Отношения под угрозой.',
      need: '«Стрелы должны долетать быстро. P95 важнее P50. Зелье не должно навредить стреле.»',
      needForce: 0, needPrecision: 60,
      harmLimit: 15, collateralLimit: 10,
      costHint: 20,
      debrief: {
        success:             '🎉 Стрелы долетают моментально. Царевна получила письмо. Свадьба назначена.',
        partial:             '⚠️ Стрелы долетели, но зелье дало побочку: у стрел облезло оперение. Тёщ недовольна.',
        partial_collateral:  '⚠️ Зелье сработало, но WAF задержал каждое второе письмо царевны. Она уже сомневается.',
        fail:                '💀 Стрелы всё ещё висят в воздухе. Царевна решила не ждать и ушла в другой дата-центр.',
        force_debrief:       'Стрелы застряли не в очереди — их перехватывали вороны. Ты налил Силы в задачу на Точность.',
        precision_debrief:   'Стрелы стояли в очереди у ворот тайм-аута. Правильное зелье, правильная причина.'
      }
    }
  ];

  // ===== СОСТОЯНИЕ =====

  let currentScenarioIdx = 0;
  let dropsById   = {};
  let currentLayer = 'stone';

  function currentScenario() { return SCENARIOS[currentScenarioIdx]; }
  function getDrops(id)       { return dropsById[id] || 0; }

  // ===== ВЫЧИСЛЕНИЯ =====

  function calcStats() {
    let totalGold = 0, totalHarm = 0, totalSmooth = 0,
        rawForce = 0, rawPrecision = 0, totalCollateral = 0;

    INGREDIENTS.forEach(ing => {
      const d = getDrops(ing.id);
      totalGold      += ing.gold * d;
      totalHarm      += ing.harm * d * d;
      totalSmooth    += ing.smooth * d;
      rawForce       += ing.force * d;
      rawPrecision   += ing.precision * d;
      if (ing.overdose && d > ing.overdose.threshold) {
        const excess = d - ing.overdose.threshold;
        totalCollateral += ing.overdose.collateral * excess * excess;
      }
    });

    const adoption = Math.min(100, Math.max(0, 60 + totalSmooth));
    const factor   = 0.3 + 0.7 * adoption / 100;
    return {
      totalGold, totalHarm, totalSmooth, adoption,
      rawForce, rawPrecision,
      effectiveForce:     rawForce     * factor,
      effectivePrecision: rawPrecision * factor,
      totalCollateral
    };
  }

  // Возвращает: 'success' | 'partial' | 'partial_collateral' | 'fail'
  function calcResult(stats) {
    const sc    = currentScenario();
    const need  = sc.axis === 'force' ? sc.needForce : sc.needPrecision;
    const power = sc.axis === 'force' ? stats.effectiveForce : stats.effectivePrecision;
    if (power < need)                              return 'fail';
    if (stats.totalCollateral > sc.collateralLimit) return 'partial_collateral';
    if (stats.totalHarm > sc.harmLimit)            return 'partial';
    return 'success';
  }

  function wasteIngredients(stats) {
    const sc        = currentScenario();
    const need      = sc.axis === 'force' ? sc.needForce : sc.needPrecision;
    const threshold = need * 0.10;
    return INGREDIENTS.filter(ing => {
      const d = getDrops(ing.id);
      if (d === 0) return false;
      const contrib = sc.axis === 'force' ? ing.force * d : ing.precision * d;
      return contrib < threshold;
    });
  }

  // ===== РЕНДЕР =====

  function renderQuest() {
    const sc   = currentScenario();
    const need = sc.axis === 'force' ? sc.needForce : sc.needPrecision;

    document.getElementById('quest-badge').textContent = sc.badgeText;
    document.getElementById('quest-badge').className   = `quest-badge ${sc.badge}`;
    document.getElementById('quest-requester').textContent = sc.requester;
    document.getElementById('quest-story').textContent     = sc.story;

    document.getElementById('quest-needs-list').innerHTML = `
      <div class="quest-need-row"><span>Нужная ось</span><span>${sc.axisLabel}</span></div>
      <div class="quest-need-row"><span>Нужна мощь</span><span>≥ ${need}</span></div>
      <div class="quest-need-row"><span>Лимит вреда</span><span>≤ ${sc.harmLimit}</span></div>
      <div class="quest-need-row"><span>Залп по своим</span><span>≤ ${sc.collateralLimit}</span></div>
      <div class="quest-need-row"><span>Ориентир по золоту</span><span>~${sc.costHint}</span></div>
      <div style="margin-top:8px;font-size:0.82rem;color:var(--muted);font-style:italic;">${sc.need}</div>
    `;
  }

  function renderMeters(stats) {
    const sc = currentScenario();
    const maxGold = 70, maxHarm = 40, maxPower = 120, maxColl = 30;

    const goldPct  = Math.min(100, stats.totalGold / maxGold * 100);
    const harmPct  = Math.min(100, Math.max(0, stats.totalHarm / maxHarm * 100));
    const harmLim  = sc.harmLimit / maxHarm * 100;
    const adoptPct = stats.adoption;
    const forcePct = Math.min(100, stats.effectiveForce / maxPower * 100);
    const precPct  = Math.min(100, stats.effectivePrecision / maxPower * 100);
    const collPct  = Math.min(100, stats.totalCollateral / maxColl * 100);
    const collLim  = sc.collateralLimit / maxColl * 100;

    const harmColor = stats.totalHarm > sc.harmLimit ? 'var(--danger)' : 'var(--text)';
    const collColor = stats.totalCollateral > sc.collateralLimit ? 'var(--danger)' : 'var(--text)';

    let html = `
      <div class="meter-row">
        <div class="meter-label">
          <span>💰 Золото</span>
          <span>${stats.totalGold.toFixed(0)} <span style="color:var(--muted);font-weight:400">(ориентир ~${sc.costHint})</span></span>
        </div>
        <div class="meter-track"><div class="meter-fill gold" style="width:${goldPct}%"></div></div>
      </div>
      <div class="meter-row">
        <div class="meter-label">
          <span>☠️ Вред</span>
          <span style="color:${harmColor}">${stats.totalHarm.toFixed(0)} / лимит ${sc.harmLimit}</span>
        </div>
        <div class="meter-track">
          <div class="meter-fill harm" style="width:${harmPct}%"></div>
          <div class="meter-limit-line" style="left:${harmLim}%"></div>
        </div>
      </div>
      <div class="meter-row">
        <div class="meter-label"><span>💚 Гладкость (внедрение)</span><span>${stats.adoption.toFixed(0)}%</span></div>
        <div class="meter-track"><div class="meter-fill smooth" style="width:${adoptPct}%"></div></div>
      </div>
      <div class="meter-row">
        <div class="meter-label"><span>🛡️ Сила</span><span>${stats.effectiveForce.toFixed(0)}</span></div>
        <div class="meter-track"><div class="meter-fill force" style="width:${forcePct}%"></div></div>
      </div>
      <div class="meter-row">
        <div class="meter-label"><span>⚡ Точность</span><span>${stats.effectivePrecision.toFixed(0)}</span></div>
        <div class="meter-track"><div class="meter-fill precision" style="width:${precPct}%"></div></div>
      </div>
    `;

    if (stats.totalCollateral > 0) {
      html += `
        <div class="meter-row">
          <div class="meter-label">
            <span>🎯 Залп по своим</span>
            <span style="color:${collColor}">${stats.totalCollateral.toFixed(0)} / лимит ${sc.collateralLimit}</span>
          </div>
          <div class="meter-track">
            <div class="meter-fill collateral" style="width:${collPct}%"></div>
            <div class="meter-limit-line" style="left:${collLim}%"></div>
          </div>
        </div>
      `;
    }

    document.getElementById('meters').innerHTML = html;
  }

  function renderIngredients(wastes) {
    const wasteIds = new Set((wastes || []).map(w => w.id));
    const col      = document.getElementById('ingredients-col');
    col.innerHTML  = '';

    INGREDIENTS
      .filter(ing => ing.layer === currentLayer)
      .forEach(ing => {
        const d          = getDrops(ing.id);
        const isActive   = d > 0;
        const isWaste    = isActive && wasteIds.has(ing.id);
        const isOverdose = ing.overdose && d > ing.overdose.threshold;

        const tags = [];
        if (ing.force > 0)      tags.push(`<span class="param-tag force">🛡️ Сила +${ing.force}</span>`);
        if (ing.precision > 0)  tags.push(`<span class="param-tag precision">⚡ Точность +${ing.precision}</span>`);
        if (ing.harm > 0)       tags.push(`<span class="param-tag harm">☠️ Вред +${ing.harm}/к²</span>`);
        if (ing.harm < 0)       tags.push(`<span class="param-tag smooth">🌿 Вред ${ing.harm}</span>`);
        if (ing.smooth > 0)     tags.push(`<span class="param-tag smooth">💚 Гладкость +${ing.smooth}</span>`);
        if (ing.smooth < 0)     tags.push(`<span class="param-tag smoothbad">💚 Гладкость ${ing.smooth}</span>`);
        if (ing.gold > 0)       tags.push(`<span class="param-tag gold">💰 Золото ${ing.gold}</span>`);
        if (ing.overdose)       tags.push(`<span class="param-tag overdose">⚠️ Перебор от ${ing.overdose.threshold + 1}+ кап.</span>`);

        let cls = 'ingredient-card';
        if (isActive)   cls += ' active';
        if (isWaste)    cls += ' waste';
        if (isOverdose) cls += ' overdosing';

        const div = document.createElement('div');
        div.className   = cls;
        div.dataset.id  = ing.id;
        div.innerHTML   = `
          <div class="ing-header">
            <span class="ing-name">${ing.name}</span>
            <div class="drops-control">
              <button class="drops-btn dec" data-id="${ing.id}">−</button>
              <span class="drops-val" id="drops-${ing.id}">${d}</span>
              <button class="drops-btn inc" data-id="${ing.id}">+</button>
            </div>
          </div>
          <div class="ing-desc">${ing.desc}</div>
          <div class="ing-params">${tags.join('')}</div>
          <div class="waste-badge">⚠️ Лишний ингредиент — почти не влияет на нужную ось</div>
          <div class="overdose-warn">🎯 Перебор! Залп по своим нарастает.</div>
        `;
        col.appendChild(div);
      });

    col.querySelectorAll('.drops-btn.inc').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        dropsById[id] = Math.min(3, (dropsById[id] || 0) + 1);
        updateUI();
      });
    });
    col.querySelectorAll('.drops-btn.dec').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        dropsById[id] = Math.max(0, (dropsById[id] || 0) - 1);
        updateUI();
      });
    });
  }

  function updateDropValues(wastes) {
    const wasteIds = new Set((wastes || []).map(w => w.id));
    INGREDIENTS.forEach(ing => {
      const d  = getDrops(ing.id);
      const el = document.getElementById(`drops-${ing.id}`);
      if (el) el.textContent = d;
      const card = document.querySelector(`.ingredient-card[data-id="${ing.id}"]`);
      if (card) {
        const isOverdose = ing.overdose && d > ing.overdose.threshold;
        card.classList.toggle('active',     d > 0);
        card.classList.toggle('waste',      d > 0 && wasteIds.has(ing.id));
        card.classList.toggle('overdosing', isOverdose);
      }
    });
  }

  function updateTabBadges() {
    ['stone', 'elixir', 'smoke', 'ritual'].forEach(layer => {
      const badge = document.getElementById(`badge-${layer}`);
      if (!badge) return;
      const count = INGREDIENTS.filter(i => i.layer === layer && getDrops(i.id) > 0).length;
      badge.textContent = count || '';
      badge.classList.toggle('visible', count > 0);
    });
  }

  function hideResult() {
    document.getElementById('result-panel').className = 'result-panel';
  }

  function showResult(stats) {
    const result = calcResult(stats);
    const sc     = currentScenario();
    const wastes = wasteIngredients(stats);
    const panel  = document.getElementById('result-panel');

    const cssClass = result.startsWith('partial') ? 'partial' : result;
    panel.className = `result-panel show ${cssClass}`;

    const titles = {
      success:            '✅ Зелье сварено удачно!',
      partial:            '⚠️ Сработало, но с побочками',
      partial_collateral: '⚠️ Сработало, но задело своих',
      fail:               '💀 Зелье не помогло'
    };
    document.getElementById('result-title').textContent = titles[result];

    let text = sc.debrief[result] || sc.debrief.partial;
    if (sc.id === 'latency' && result !== 'fail') {
      const forceDrop = INGREDIENTS.filter(i => i.force > 10)
        .reduce((s, i) => s + getDrops(i.id) * i.force, 0);
      const precDrop = INGREDIENTS.filter(i => i.precision > 10)
        .reduce((s, i) => s + getDrops(i.id) * i.precision, 0);
      const extra = forceDrop > precDrop ? sc.debrief.force_debrief : sc.debrief.precision_debrief;
      if (extra) text += ' ' + extra;
    }
    document.getElementById('result-text').textContent = text;

    let extrasHtml = '';
    if (wastes.length > 0) {
      extrasHtml = `<strong>🗑️ Лишнее в котле:</strong> ${wastes.map(w => w.name).join(', ')} — вклад в нужную ось меньше 10%.`;
    }
    document.getElementById('result-extras').innerHTML = extrasHtml;

    document.getElementById('cauldron-visual').textContent =
      result === 'success' ? '✨' : result.startsWith('partial') ? '🌡️' : '💣';
  }

  function updateUI(rerender) {
    const stats  = calcStats();
    const wastes = wasteIngredients(stats);
    renderMeters(stats);
    if (rerender) renderIngredients(wastes);
    else          updateDropValues(wastes);
    updateTabBadges();
  }

  function resetCauldron() {
    dropsById = {};
    hideResult();
    document.getElementById('cauldron-visual').textContent = '🫧';
    updateUI(true);
  }

  // ===== СОБЫТИЯ =====

  document.getElementById('btn-brew').addEventListener('click', () => {
    const stats    = calcStats();
    const cauldron = document.getElementById('cauldron-visual');
    cauldron.classList.add('brewing');
    setTimeout(() => {
      cauldron.classList.remove('brewing');
      showResult(stats);
      updateUI(true);
    }, 500);
  });

  document.getElementById('btn-reset').addEventListener('click', resetCauldron);

  document.getElementById('btn-next').addEventListener('click', () => {
    currentScenarioIdx = (currentScenarioIdx + 1) % SCENARIOS.length;
    resetCauldron();
    renderQuest();
  });

  document.getElementById('tab-bar').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    currentLayer = btn.dataset.layer;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateUI(true);
  });

  // ===== ЗАПУСК =====

  renderQuest();
  renderIngredients([]);
  updateUI(false);
</script>
</body>
</html>
