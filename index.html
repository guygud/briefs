<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Зельевар Staff-инженера</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3247;
  --text: #e4e6f0;
  --muted: #7b82a0;
  --accent: #7c6af7;
  --success: #3fb950;
  --danger: #f85149;
  --warn: #d29922;
  --gold-color: #f0a030;
  --radius: 10px;
  --domain-web:   #5a9ef8;
  --domain-db:    #e07840;
  --domain-infra: #3fc87a;
  --domain-glass: #b08af7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }

header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; gap:14px;
}
header h1 { font-size:1.05rem; font-weight:700; }
header .sub { font-size:.78rem; color:var(--muted); }
.scenario-switcher { margin-left:auto; display:flex; align-items:center; gap:8px; }
.scenario-idx { font-size:.8rem; color:var(--muted); }

.btn {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:6px 14px; border-radius:6px; cursor:pointer; font-size:.82rem;
  transition:background .15s,border-color .15s;
}
.btn:hover { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.btn.primary:hover { opacity:.85; }
.btn.danger { border-color:var(--danger); color:var(--danger); }
.btn.danger:hover { background:var(--danger); color:#fff; }
.btn.sm { padding:3px 9px; font-size:.76rem; }

main { flex:1; display:grid; grid-template-columns:280px 1fr 320px; overflow:hidden; }
.col { padding:14px; overflow-y:auto; height:calc(100vh - 48px); }
.col-left  { border-right:1px solid var(--border); }
.col-right { border-left:1px solid var(--border); }

/* Quest card */
.quest-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-bottom:12px; }
.quest-badge { display:inline-block; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 8px; font-size:.7rem; color:var(--muted); margin-bottom:6px; }
.quest-requester { font-size:.98rem; font-weight:700; margin-bottom:5px; }
.quest-story { font-size:.8rem; color:var(--muted); line-height:1.5; margin-bottom:8px; }
.quest-need { background:var(--surface2); border-left:3px solid var(--accent); padding:7px 10px; border-radius:4px; font-size:.8rem; font-style:italic; margin-bottom:8px; }
.quest-hint { background:rgba(124,106,247,.1); border:1px solid rgba(124,106,247,.3); border-radius:6px; padding:6px 10px; font-size:.76rem; color:#a99ef7; line-height:1.4; }
.target-badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
.target-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:12px; font-size:.72rem; font-weight:700; background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
.target-badge.fragile  { border-color:var(--danger); color:var(--danger); }
.target-badge.stubborn { border-color:var(--warn);   color:var(--warn);   }
.requires-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.require-chip { display:flex; align-items:center; gap:3px; padding:3px 9px; border-radius:20px; font-size:.75rem; font-weight:700; background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
.require-chip.met   { border-color:var(--success); color:var(--success); }
.require-chip.unmet { border-color:var(--danger);  color:var(--danger);  }

/* Cauldron */
.cauldron-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cauldron-title { font-weight:700; font-size:.92rem; }
.gold-badge { display:flex; align-items:center; gap:4px; background:rgba(240,160,48,.12); border:1px solid rgba(240,160,48,.4); border-radius:20px; padding:3px 10px; font-size:.8rem; font-weight:700; color:var(--gold-color); }
.gold-badge.over { border-color:var(--danger); color:var(--danger); background:rgba(248,81,73,.12); }

/* Slot groups */
.slot-groups-wrapper { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
.slot-group { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.slot-group.locked { opacity:.35; pointer-events:none; }
.slot-group-header {
  display:flex; align-items:center; gap:6px;
  padding:6px 10px; background:var(--surface2);
  border-bottom:1px solid var(--border); font-size:.78rem;
}
.slot-group-header .gh-icon { font-size:.9rem; }
.slot-group-header .gh-label { font-weight:700; flex:1; }
.slot-group-header .gh-meta  { color:var(--muted); font-size:.7rem; }
.slot-group-header .gh-add {
  background:none; border:1px dashed var(--border); color:var(--muted);
  border-radius:5px; padding:1px 7px; cursor:pointer; font-size:.75rem;
  transition:all .15s;
}
.slot-group-header .gh-add:hover { border-color:var(--accent); color:var(--accent); }
.slot-group-body { display:flex; flex-wrap:wrap; gap:8px; padding:8px; }
.slot-group-locked-msg { padding:8px 10px; font-size:.75rem; color:var(--muted); }

.slot-card {
  flex:1; min-width:130px; max-width:200px;
  border:1.5px solid var(--border); border-radius:8px; overflow:hidden;
  cursor:pointer; transition:border-color .18s; position:relative; min-height:70px;
}
.slot-card:hover:not(.locked-slot) { border-color:var(--accent); }
.slot-card.active-target { border-color:var(--accent); box-shadow:0 0 0 2px rgba(124,106,247,.25); }
.slot-card.filled:hover:not(.locked-slot) { border-color:#5a9ef8; }
.slot-card.locked-slot { opacity:.3; cursor:not-allowed; pointer-events:none; }
.slot-header { background:var(--surface2); padding:4px 8px; display:flex; align-items:center; gap:4px; font-size:.7rem; color:var(--muted); border-bottom:1px solid var(--border); }
.slot-header .sh-label { flex:1; font-weight:600; font-size:.68rem; }
.slot-body { padding:6px 8px; min-height:48px; display:flex; flex-direction:column; justify-content:center; }
.slot-empty { font-size:.72rem; color:var(--muted); text-align:center; }
.slot-ing-name { font-size:.76rem; font-weight:600; margin-bottom:3px; line-height:1.3; }
.slot-ing-effects { display:flex; flex-wrap:wrap; gap:2px; }
.slot-ing-remove {
  position:absolute; top:4px; right:5px; background:none; border:none;
  color:var(--muted); cursor:pointer; font-size:.75rem; padding:1px 3px; border-radius:3px;
}
.slot-ing-remove:hover { color:var(--danger); background:rgba(248,81,73,.12); }

/* Domain colors */
.dom-web   { color:var(--domain-web);   border-color:var(--domain-web)!important; }
.dom-db    { color:var(--domain-db);    border-color:var(--domain-db)!important; }
.dom-infra { color:var(--domain-infra); border-color:var(--domain-infra)!important; }
.dom-glass { color:var(--domain-glass); border-color:var(--domain-glass)!important; }

/* Effect chips */
.effect-chip { display:inline-flex; align-items:center; gap:2px; padding:1px 5px; border-radius:10px; font-size:.68rem; font-weight:700; background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
.effect-chip.shield    { border-color:#5a9ef8; color:#5a9ef8; }
.effect-chip.speed     { border-color:#f0c040; color:#f0c040; }
.effect-chip.insight   { border-color:#b08af7; color:#b08af7; }
.effect-chip.rollout   { border-color:#3fb950; color:#3fb950; }
.effect-chip.contract  { border-color:#f09050; color:#f09050; }
.effect-chip.simplicity{ border-color:#50d0d0; color:#50d0d0; }

/* Effects preview */
.effects-preview { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; padding:8px 10px; background:var(--surface2); border-radius:var(--radius); border:1px solid var(--border); }
.effects-preview-title { width:100%; font-size:.7rem; color:var(--muted); margin-bottom:3px; }
.eff-req-chip { display:flex; align-items:center; gap:4px; padding:4px 9px; border-radius:18px; font-size:.76rem; font-weight:700; background:var(--bg); border:1.5px solid var(--border); }
.eff-req-chip.met   { border-color:var(--success); color:var(--success); }
.eff-req-chip.unmet { border-color:var(--danger);  color:var(--danger);  }
.eff-req-chip .eff-val { font-size:.68rem; opacity:.8; }

/* Cauldron actions */
.cauldron-actions { display:flex; gap:8px; margin-bottom:10px; }
.cauldron-actions .btn { flex:1; text-align:center; }

/* Result */
#result-panel { display:none; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; margin-top:8px; }
.result-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.result-icon { font-size:1.8rem; }
.result-title { font-size:.98rem; font-weight:700; }
.result-subtitle { font-size:.78rem; color:var(--muted); }
.event-rows { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.event-row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:7px; font-size:.82rem; font-weight:600; }
.event-row.good { background:rgba(63,185,80,.1);  color:#3fb950; }
.event-row.bad  { background:rgba(248,81,73,.1);   color:#f85149; }
.event-row.warn { background:rgba(240,160,48,.1);  color:#f0a030; }
.result-story { font-size:.8rem; color:var(--muted); line-height:1.5; margin-bottom:8px; padding:7px 10px; background:var(--surface2); border-radius:6px; }
.waste-note { font-size:.76rem; color:var(--warn); padding:5px 9px; background:rgba(210,153,34,.1); border-radius:6px; margin-bottom:8px; }
.conflict-list { margin-bottom:8px; }
.conflict-item { font-size:.74rem; color:var(--warn); padding:3px 8px; background:rgba(210,153,34,.08); border-radius:4px; margin-bottom:2px; }
.details-toggle { background:none; border:1px dashed var(--border); color:var(--muted); border-radius:6px; padding:4px 10px; cursor:pointer; font-size:.78rem; width:100%; transition:all .15s; }
.details-toggle:hover { border-color:var(--accent); color:var(--accent); }
#result-details { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.details-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:6px; }
.detail-item { background:var(--surface2); border-radius:6px; padding:5px 9px; font-size:.76rem; }
.detail-item .d-label { color:var(--muted); font-size:.68rem; margin-bottom:1px; }
.detail-item .d-value { font-weight:700; }
.detail-item .d-value.ok  { color:var(--success); }
.detail-item .d-value.bad { color:var(--danger); }

/* Right panel — ingredients */
.pick-mode-banner { display:none; align-items:center; gap:7px; background:rgba(124,106,247,.15); border:1px solid rgba(124,106,247,.4); border-radius:8px; padding:7px 10px; margin-bottom:8px; font-size:.8rem; }
.pick-mode-banner.visible { display:flex; }
.pick-cancel { margin-left:auto; background:none; border:none; color:var(--accent); cursor:pointer; font-size:.78rem; }

.tab-bar { display:flex; gap:3px; margin-bottom:8px; flex-wrap:wrap; }
.tab-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:4px 9px; cursor:pointer; font-size:.74rem; color:var(--muted); transition:all .15s; }
.tab-btn:hover { color:var(--text); border-color:var(--accent); }
.tab-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.tab-btn.grayed { opacity:.35; pointer-events:none; }

.ing-list { display:flex; flex-direction:column; gap:6px; }
.ing-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:9px 11px; cursor:pointer; transition:border-color .18s; position:relative; }
.ing-card:hover { border-color:var(--accent); }
.ing-card.placed  { border-color:#5a9ef8; opacity:.65; pointer-events:none; }
.ing-card.trap    { border-color:rgba(248,81,73,.3); }
.ing-card.cross   { border-color:rgba(240,160,48,.4); }
.ing-name { font-size:.82rem; font-weight:700; margin-bottom:3px; }
.ing-desc { font-size:.73rem; color:var(--muted); margin-bottom:5px; line-height:1.4; }
.ing-meta { display:flex; flex-wrap:wrap; gap:3px; align-items:center; }
.gold-tag   { background:rgba(240,160,48,.12); border:1px solid rgba(240,160,48,.4);  color:var(--gold-color); border-radius:9px; padding:1px 6px; font-size:.68rem; font-weight:700; }
.cross-tag  { background:rgba(240,160,48,.08); border:1px solid rgba(240,160,48,.3);  color:#d29922; border-radius:9px; padding:1px 6px; font-size:.68rem; }
.harm-tag   { background:rgba(248,81,73,.1);   border:1px solid rgba(248,81,73,.3);   color:#f85149; border-radius:9px; padding:1px 6px; font-size:.68rem; }
.adopt-tag  { background:rgba(63,185,80,.1);   border:1px solid rgba(63,185,80,.3);   color:#3fb950; border-radius:9px; padding:1px 6px; font-size:.68rem; }
.adopt-neg  { background:rgba(210,153,34,.1);  border:1px solid rgba(210,153,34,.3);  color:#d29922; border-radius:9px; padding:1px 6px; font-size:.68rem; }
.dom-tag    { border-radius:9px; padding:1px 6px; font-size:.68rem; font-weight:700; border:1px solid; }
.ing-placed-label { position:absolute; top:5px; right:7px; font-size:.66rem; color:#5a9ef8; background:rgba(90,158,248,.1); border-radius:3px; padding:1px 4px; }
.ing-conflict-warn { font-size:.68rem; color:var(--warn); margin-top:3px; display:none; }
.ing-conflict-warn.show { display:block; }
.ing-forbidden { font-size:.68rem; color:var(--danger); margin-top:3px; }

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
</style>
</head>
<body>
<header>
  <span style="font-size:1.3rem">🧪</span>
  <div>
    <h1>Зельевар Staff-инженера</h1>
    <div class="sub">Выбери Основу → добавь Реагенты и Катализаторы → проведи Ритуал</div>
  </div>
  <div class="scenario-switcher">
    <span class="scenario-idx" id="scenario-idx">1 / 8</span>
    <button class="btn" id="btn-prev">◀ Назад</button>
    <button class="btn" id="btn-next">Вперёд ▶</button>
  </div>
</header>

<main>
  <div class="col col-left"  id="col-quest"></div>
  <div class="col col-center" id="col-cauldron">
    <div class="cauldron-header">
      <span class="cauldron-title">🫕 Котёл</span>
      <div class="gold-badge" id="gold-badge">💰 0 / 0</div>
    </div>
    <div class="slot-groups-wrapper" id="slot-groups"></div>
    <div class="effects-preview" id="effects-preview"></div>
    <div class="cauldron-actions">
      <button class="btn primary" id="btn-brew">⚗️ Сварить зелье</button>
      <button class="btn danger"  id="btn-reset">🗑 Сбросить</button>
    </div>
    <div id="result-panel"></div>
  </div>
  <div class="col col-right" id="col-ingredients">
    <div class="pick-mode-banner" id="pick-banner">
      <span id="pick-banner-text">Выбери ингредиент</span>
      <button class="pick-cancel" id="pick-cancel">✕ Отмена</button>
    </div>
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn" data-ct="foundation">🏰 Основы</button>
      <button class="tab-btn active" data-ct="reagent">⚗️ Реагенты</button>
      <button class="tab-btn" data-ct="catalyst">🔬 Катализаторы</button>
      <button class="tab-btn" data-ct="stabilizer">⚖️ Стабилизаторы</button>
      <button class="tab-btn" data-ct="ritual">🕯️ Ритуалы</button>
    </div>
    <div class="ing-list" id="ing-list"></div>
  </div>
</main>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────
const EFFECT_META = {
  shield:     { icon:'🛡', label:'Защита',    cls:'shield' },
  speed:      { icon:'⚡', label:'Скорость',  cls:'speed' },
  insight:    { icon:'🔭', label:'Видимость', cls:'insight' },
  rollout:    { icon:'🚀', label:'Раскатка',  cls:'rollout' },
  contract:   { icon:'📜', label:'Контракт',  cls:'contract' },
  simplicity: { icon:'🧹', label:'Простота',  cls:'simplicity' },
};
const DOMAIN_META = {
  web:   { icon:'🌐', label:'WEB',   cls:'dom-web' },
  db:    { icon:'📚', label:'DB',    cls:'dom-db' },
  infra: { icon:'🧰', label:'INFRA', cls:'dom-infra' },
  glass: { icon:'🔭', label:'GLASS', cls:'dom-glass' },
};
const CARDTYPE_META = {
  foundation: { icon:'🏰', label:'Основа' },
  reagent:    { icon:'⚗️',  label:'Реагент' },
  catalyst:   { icon:'🔬', label:'Катализатор' },
  stabilizer: { icon:'⚖️', label:'Стабилизатор' },
  ritual:     { icon:'🕯️', label:'Ритуал' },
};
const CROSS_PENALTY = 3;

// ─── INGREDIENTS (80 cards) ──────────────────────────────────────
const INGREDIENTS = [
  // ── FOUNDATIONS (4) ──
  { id:'web_gate',       cardType:'foundation', domain:'web',   name:'🏰 Врата Веба',         desc:'В этом котле хорошо работают фильтры, кеш и всё, что стоит на входе. Чужие карты обходятся дороже.', gold:0 },
  { id:'db_ledger',      cardType:'foundation', domain:'db',    name:'📚 Книга Учёта',         desc:'Здесь лучше растворяются закладки, запросы и распределение страниц. DB-карты в родной стихии.', gold:0 },
  { id:'infra_workshop', cardType:'foundation', domain:'infra', name:'🧰 Мастерская Инфры',    desc:'Любит кластеры, очереди и оркестраторов. Не любит ручной колхоз. INFRA-карты без наценки.', gold:0 },
  { id:'glass_room',     cardType:'foundation', domain:'glass', name:'🔭 Стеклянная Комната',  desc:'Всё становится видимым. Прежде чем резать — посмотри. GLASS-карты работают точнее всего.', gold:0 },

  // ── WEB REAGENTS (6) ──
  { id:'rate_limit',  cardType:'reagent', domain:'web',  name:'💧 Rate Limit',            desc:'Режем поток. Грубо, но надёжно. Птицы и фазаны не разбираются.',
    effectPower:{shield:25}, adoption:-5, harm:8,  gold:2,  collateralBase:6,
    conflicts:['canary','ab_test'], conflictNote:'Rate Limit фильтрует поток — канарейке/А/Б нечего делать' },
  { id:'waf',         cardType:'reagent', domain:'web',  name:'🔮 WAF Руны',               desc:'Магические правила фильтрации. Ложные блокировки в комплекте.',
    effectPower:{shield:20,contract:10}, adoption:-4, harm:7,  gold:8,  collateralBase:5,
    conflicts:['canary','ab_test'], conflictNote:'WAF переписывает заголовки — канарейка не получит честную выборку' },
  { id:'ddos_screen', cardType:'reagent', domain:'web',  name:'🧱 DDoS-Экран',             desc:'Мощно. Дорого. Без вопросов.',
    effectPower:{shield:40}, adoption:-2, harm:3,  gold:12 },
  { id:'hard_cache',  cardType:'reagent', domain:'web',  name:'🫙 Жёсткий Cache',          desc:'Быстро, но данные могут протухнуть. Схему не проверяет.',
    effectPower:{speed:18}, adoption:0,  harm:5,  gold:5,
    conflicts:['size_limits'], conflictNote:'Жёсткий кеш возвращает данные старой схемы — контракт нарушается тихо' },
  { id:'compression', cardType:'reagent', domain:'web',  name:'🧪 Сжатие-Эликсир',         desc:'Легче в сети, жарче CPU.',
    effectPower:{speed:15}, adoption:0,  harm:4,  gold:4 },
  { id:'cut_heavy',   cardType:'reagent', domain:'web',  name:'🪓 Отсечь Тяжёлые',          desc:'Режем дорогие ручки. Функциональность тоже.',
    effectPower:{speed:20}, adoption:-5, harm:6,  gold:3 },

  // ── DB REAGENTS (6) ──
  { id:'remove_n1',    cardType:'reagent', domain:'db', name:'🧯 Убрать N+1',              desc:'Ускоряет. Риск: сломать логику.',
    effectPower:{speed:22}, adoption:0,  harm:6, gold:4 },
  { id:'conn_pool',    cardType:'reagent', domain:'db', name:'🧵 Пул Соединений',           desc:'Стабилизирует. Легко задушить.',
    effectPower:{speed:15}, adoption:0,  harm:4, gold:3 },
  { id:'hard_locks',   cardType:'reagent', domain:'db', name:'🔒 Жёсткие Блокировки',       desc:'Консистентность ценой латентности и очередей.',
    effectPower:{contract:20}, adoption:-4, harm:8, gold:5 },
  { id:'mat_view',     cardType:'reagent', domain:'db', name:'🗃️ Материализованный Слепок', desc:'Быстро. Данные устаревают.',
    effectPower:{speed:20}, adoption:0,  harm:6, gold:6 },

// ─── STATE ───────────────────────────────────────────────────────
let scenarioIdx = 0;
let slotFills = {
  foundation: null,
  reagents:   [null, null],
  catalysts:  [null, null, null],
  stabilizer: null,
  ritual:     null,
};
let visibleSlots    = { reagents: 1, catalysts: 1 };
let activePickGroup = null; // 'foundation'|'reagents'|'catalysts'|'stabilizer'|'ritual'
let activePickIdx   = null; // index for array groups
let currentCardType = 'reagent';

// ─── HELPERS ─────────────────────────────────────────────────────
const sc  = () => SCENARIOS[scenarioIdx];
const ing = id => INGREDIENTS.find(i => i.id === id);

function allPlaced() {
  const result = [];
  const f = ing(slotFills.foundation);
  if (f) result.push({ group:'foundation', idx:0, i:f });
  (slotFills.reagents || []).forEach((id, idx) => { const i = ing(id); if (i) result.push({ group:'reagents',  idx, i }); });
  (slotFills.catalysts|| []).forEach((id, idx) => { const i = ing(id); if (i) result.push({ group:'catalysts', idx, i }); });
  const st = ing(slotFills.stabilizer);
  if (st) result.push({ group:'stabilizer', idx:0, i:st });
  const ri = ing(slotFills.ritual);
  if (ri) result.push({ group:'ritual', idx:0, i:ri });
  return result;
}

function placedIdSet() {
  return new Set(allPlaced().map(p => p.i.id));
}

function foundationCard() { return ing(slotFills.foundation); }
function foundationDomain() { return foundationCard()?.domain || null; }

function isCrossDomain(card) {
  const fd = foundationDomain();
  if (!fd || !card.domain) return false;
  if (card.cardType === 'foundation') return false;
  return card.domain !== fd;
}

function effectiveGold(card) {
  return (card.gold || 0) + (isCrossDomain(card) ? CROSS_PENALTY : 0);
}

// ─── CALC STATS ──────────────────────────────────────────────────
function calcStats() {
  const s = sc();
  const effects = { shield:0, speed:0, insight:0, rollout:0, contract:0, simplicity:0 };
  let totalHarm = 0, totalAdoption = 0, totalCollateral = 0, totalGold = 0;

  const placed = allPlaced();

  // Conflict detection
  const conflictPairs = [];
  const conflictIds   = new Set();
  for (const { i:a } of placed) {
    for (const { i:b } of placed) {
      if (a.id === b.id) continue;
      if ((a.conflicts||[]).includes(b.id)) {
        const key = [a.id,b.id].sort().join('|');
        if (!conflictPairs.find(p => p.key === key)) {
          conflictPairs.push({ key, a:a.id, b:b.id, note: a.conflictNote || b.conflictNote || '' });
          conflictIds.add(a.id);
          conflictIds.add(b.id);
        }
      }
    }
  }

  // Reagent harm multiplier (non-linear stacking)
  const reagentCount   = (slotFills.reagents || []).filter(Boolean).length;
  const reagentHarmMul = reagentCount >= 2 ? (reagentCount >= 3 ? 2.5 : 1.5) : 1.0;
  const fragileMul     = s.targetProps?.fragile ? 2.0 : 1.0;

  for (const { group, i } of placed) {
    const effPenalty = conflictIds.has(i.id) ? 0.7 : 1.0;
    const crossGold  = effectiveGold(i);
    totalGold     += crossGold;
    totalAdoption += i.adoption || 0;
    totalCollateral += i.collateralBase || 0;

    // Harm: reagents get stacking + fragile multiplier
    let harmAmt = i.harm || 0;
    if (i.cardType === 'reagent') {
      harmAmt = harmAmt * reagentHarmMul * fragileMul;
    }
    totalHarm += harmAmt;

    if (i.cardType !== 'foundation') {
      for (const [eff, val] of Object.entries(i.effectPower || {})) {
        effects[eff] = (effects[eff] || 0) + Math.round(val * effPenalty);
      }
    }
  }

  totalHarm   = Math.max(0, totalHarm);
  const adoptionPct = Math.min(100, Math.max(0, 60 + totalAdoption));

  return { effects, totalHarm, totalAdoption, adoptionPct, totalCollateral, totalGold,
           conflictPairs, placed, reagentCount, reagentHarmMul, fragileMul };
}

// ─── CALC RESULT ─────────────────────────────────────────────────
function calcResult(stats) {
  const s = sc();

  const effectsMet = Object.entries(s.requires).every(
    ([eff, need]) => (stats.effects[eff] || 0) >= need
  );
  const overBudget = stats.totalGold > s.goldBudget;
  const isFinal    = s.id === 'final';
  const solved     = effectsMet && (isFinal || !overBudget);

  const hurtAlliesBase =
    stats.totalHarm > s.harmLimit ||
    (s.collateralLimit < 999 && stats.totalCollateral > s.collateralLimit);

  const teamUnhappy = stats.adoptionPct < (s.teamHappyMin || 50);

  // Waste: skip foundation, ritual, stabilizer
  const requiredEffects = Object.keys(s.requires);
  const wasteIds = stats.placed
    .filter(({ i }) => {
      if (['foundation','ritual','stabilizer'].includes(i.cardType)) return false;
      const contribs = Object.entries(i.effectPower||{}).filter(([e,v]) => v>0 && requiredEffects.includes(e));
      return contribs.length === 0;
    }).map(({ i }) => i.id);

  // requiredGroups check
  const reqGroups = s.requiredGroups || [];
  const emptyRequired = reqGroups.filter(group => {
    if (group === 'reagents')  return (slotFills.reagents ||[]).every(id => !id);
    if (group === 'catalysts') return (slotFills.catalysts||[]).every(id => !id);
    return !slotFills[group];
  });

  // stubborn: ritual must be filled
  if (s.targetProps?.stubborn && !slotFills.ritual && !emptyRequired.includes('ritual')) {
    emptyRequired.push('ritual');
  }

  const forcedPartial  = solved && emptyRequired.length > 0;
  const hurtAllies = hurtAlliesBase || (isFinal && overBudget) || forcedPartial;

  return { solved, hurtAllies, teamUnhappy, wasteIds, overBudget, emptyRequired };
}

// ─── RENDER QUEST ────────────────────────────────────────────────
function renderQuest() {
  const s = sc();
  const stats = calcStats();

  const reqChips = Object.entries(s.requires).map(([eff, need]) => {
    const m = EFFECT_META[eff], cur = stats.effects[eff]||0, met = cur >= need;
    return `<span class="require-chip ${met?'met':'unmet'}">${m.icon} ${m.label} ${need}</span>`;
  }).join('');

  const targetBadges = [];
  if (s.targetProps?.fragile)  targetBadges.push(`<span class="target-badge fragile">💔 Хрупкая цель — вред ×2</span>`);
  if (s.targetProps?.stubborn) targetBadges.push(`<span class="target-badge stubborn">🤔 Упрямая цель — нужен Ритуал</span>`);

  document.getElementById('col-quest').innerHTML = `
    <div class="quest-card">
      <div class="quest-badge">${s.badgeText}</div>
      <div class="quest-requester">${s.requester}</div>
      <div class="quest-story">${s.story}</div>
      <div class="quest-need">${s.need}</div>
      ${targetBadges.length ? `<div class="target-badges">${targetBadges.join('')}</div>` : ''}
      <div class="requires-row">${reqChips}</div>
      <div class="quest-hint">${s.hint}</div>
    </div>
  `;
}

// ─── RENDER EFFECTS PREVIEW ──────────────────────────────────────
function renderEffectsPreview(stats) {
  const s = sc();

    const m = EFFECT_META[eff], cur = stats.effects[eff]||0, met = cur >= need;

  }).join('');

    `<div class="effects-preview-title">Нужные эффекты</div>${chips}`;

// ─── RENDER SLOT GROUPS ──────────────────────────────────────────
function renderSlotGroups() {
  const s = sc();
  const GROUPS = [
    { key:'foundation', label:'Основа',        icon:'🏰', isArray:false },
    { key:'reagents',   label:'Реагенты',       icon:'⚗️',  isArray:true  },
    { key:'catalysts',  label:'Катализаторы',   icon:'🔬', isArray:true  },
    { key:'stabilizer', label:'Стабилизатор',   icon:'⚖️', isArray:false },
    { key:'ritual',     label:'Ритуал',         icon:'🕯️', isArray:false },
  ];

  const html = GROUPS.map(grp => {
    const max = s.activeGroups[grp.key] || 0;
    if (max === 0) {
      return `<div class="slot-group locked">
        <div class="slot-group-header"><span class="gh-icon">${grp.icon}</span><span class="gh-label">${grp.label}</span><span class="gh-meta">🔒 заблокировано</span></div>
      </div>`;
    }

    let slots = [];
    if (grp.isArray) {
      const vis = Math.min(visibleSlots[grp.key] || 1, max);
      for (let i = 0; i < vis; i++) {
        const filledId = slotFills[grp.key][i];
        slots.push(renderOneSlot(grp.key, i, filledId));
      }
      const canAdd = vis < max;
      const addBtn = canAdd ? `<button class="gh-add" data-grp="${grp.key}">+ ещё</button>` : '';
      const header = `<div class="slot-group-header"><span class="gh-icon">${grp.icon}</span><span class="gh-label">${grp.label}</span><span class="gh-meta">до ${max}</span>${addBtn}</div>`;
      return `<div class="slot-group"><div class="slot-group-header"><span class="gh-icon">${grp.icon}</span><span class="gh-label">${grp.label}</span><span class="gh-meta">до ${max}</span>${addBtn}</div><div class="slot-group-body">${slots.join('')}</div></div>`;
    } else {
      const filledId = slotFills[grp.key];
      slots.push(renderOneSlot(grp.key, 0, filledId));
      const isTarget = (activePickGroup === grp.key);
      return `<div class="slot-group"><div class="slot-group-header"><span class="gh-icon">${grp.icon}</span><span class="gh-label">${grp.label}</span></div><div class="slot-group-body">${slots.join('')}</div></div>`;
    }
  }).join('');

  document.getElementById('slot-groups').innerHTML = html;

  // Add button listeners
  document.querySelectorAll('.gh-add').forEach(btn => {
    btn.addEventListener('click', e => {
      const grp = btn.dataset.grp;
      visibleSlots[grp] = Math.min((visibleSlots[grp]||1)+1, sc().activeGroups[grp]||0);
      updateUI(false);
    });
  });

  // Slot click listeners
  document.querySelectorAll('.slot-card').forEach(card => {
    card.addEventListener('click', e => {
      e.stopPropagation();
      const grp = card.dataset.grp, idx = parseInt(card.dataset.idx||'0');
      if (activePickGroup === grp && activePickIdx === idx) {
        activePickGroup = null; activePickIdx = null;
      } else {
        activePickGroup = grp; activePickIdx = idx;
        currentCardType = grp === 'reagents' ? 'reagent' : grp === 'catalysts' ? 'catalyst' : grp === 'stabilizer' ? 'stabilizer' : grp === 'ritual' ? 'ritual' : 'foundation';
        // Switch tab
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const tb = document.querySelector(`.tab-btn[data-ct="${currentCardType}"]`);
        if (tb) tb.classList.add('active');
      }
      updateUI(false);
    });
  });

  // Remove buttons
  document.querySelectorAll('.slot-ing-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const grp = btn.dataset.grp, idx = parseInt(btn.dataset.idx||'0');
      if (grp === 'reagents' || grp === 'catalysts') slotFills[grp][idx] = null;
      else slotFills[grp] = null;
      updateUI(false);
    });
  });
}

function renderOneSlot(grp, idx, filledId) {
  const filled = ing(filledId);
  const isTarget = (activePickGroup === grp && activePickIdx === idx);

  let bodyHtml;
  if (filled) {
    const effBadges = Object.entries(filled.effectPower||{}).filter(([,v])=>v>0)
      .map(([eff,v])=>`<span class="effect-chip ${EFFECT_META[eff].cls}">${EFFECT_META[eff].icon} ${v}</span>`).join('');
    bodyHtml = `
      <div class="slot-body">
        <div class="slot-ing-name">${filled.name}</div>
        <div class="slot-ing-effects">${effBadges||'<span style="font-size:.68rem;color:var(--muted)">нет эффектов</span>'}</div>
      </div>
      <button class="slot-ing-remove" data-grp="${grp}" data-idx="${idx}">✕</button>`;
  } else {
    bodyHtml = `<div class="slot-body"><div class="slot-empty">+ нажми для выбора</div></div>`;
  }

  return `<div class="slot-card ${isTarget?'active-target':''} ${filled?'filled':''}" data-grp="${grp}" data-idx="${idx}">
    <div class="slot-header"><span class="sh-label">${CARDTYPE_META[grp==='reagents'?'reagent':grp==='catalysts'?'catalyst':grp].label} ${idx+1 > 1 ? idx+1 : ''}</span></div>
    ${bodyHtml}
  </div>`;
}

// ─── RENDER INGREDIENTS ──────────────────────────────────────────
function renderIngredients() {
  const s = sc();
  const placed = placedIdSet();
  const fd = foundationDomain();
  const inPickMode = activePickGroup !== null;

  const filtered = INGREDIENTS.filter(i => {
    if (i.cardType !== currentCardType) return false;
    // Foundation pick: only show foundationOptions
    if (currentCardType === 'foundation') {
      return (s.foundationOptions || []).includes(i.id);
    }
    return true;
  });

  const html = filtered.map(i => {
    const isPlaced   = placed.has(i.id);
    const cross      = isCrossDomain(i);
    const goldCost   = effectiveGold(i);
    const hasConflict = (i.conflicts||[]).some(cid => placed.has(cid));
    const conflictWith = hasConflict ? (i.conflicts||[]).filter(c=>placed.has(c)).map(c=>ing(c)?.name||c).join(', ') : null;

    const effBadges = Object.entries(i.effectPower||{}).filter(([,v])=>v>0)
      .map(([eff,v])=>`<span class="effect-chip ${EFFECT_META[eff].cls}">${EFFECT_META[eff].icon} +${v}</span>`).join('');

    const goldTag  = `<span class="gold-tag">💰 ${goldCost}${cross ? ` (+${CROSS_PENALTY})` : ''}</span>`;
    const crossTag = cross ? `<span class="cross-tag">⬡ Не родная +${CROSS_PENALTY}</span>` : '';
    const harmTag  = (i.harm||0) > 0 ? `<span class="harm-tag">⚠️ вред ${i.harm}</span>` : '';
    const adoptTag = (i.adoption||0) > 0 ? `<span class="adopt-tag">😊 +${i.adoption}</span>` : (i.adoption||0) < 0 ? `<span class="adopt-neg">😑 ${i.adoption}</span>` : '';
    const isTrap   = Object.keys(i.effectPower||{}).length === 0 && i.cardType !== 'foundation';

    const domCls = DOMAIN_META[i.domain]?.cls || '';
    const domTag = i.domain ? `<span class="dom-tag ${domCls}" style="background:rgba(0,0,0,.15)">${DOMAIN_META[i.domain]?.icon} ${DOMAIN_META[i.domain]?.label}</span>` : '';

    return `<div class="ing-card ${isPlaced?'placed':''} ${isTrap?'trap':''} ${cross?'cross':''}"
      data-id="${i.id}" ${isPlaced ? '' : `onclick="onIngClick('${i.id}')"`}>
      ${isPlaced ? '<span class="ing-placed-label">В котле</span>' : ''}
      <div class="ing-name">${i.name}</div>
      <div class="ing-desc">${i.desc}</div>
      <div class="ing-meta">
        ${effBadges || (i.cardType!=='foundation' ? '<span style="font-size:.68rem;color:var(--muted)">нет эффектов</span>' : '')}
        ${goldTag}${crossTag}${harmTag}${adoptTag}${domTag}
      </div>
      ${hasConflict ? `<div class="ing-conflict-warn show">⚡ Конфликт с: ${conflictWith}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('ing-list').innerHTML = html || `<div style="color:var(--muted);font-size:.8rem;padding:10px">Нет карт этого типа</div>`;
}

// ─── PICK BANNER ─────────────────────────────────────────────────
function renderPickBanner() {
  const banner = document.getElementById('pick-banner');
  if (activePickGroup) {
    const ct = activePickGroup === 'reagents' ? 'reagent' : activePickGroup === 'catalysts' ? 'catalyst' : activePickGroup === 'stabilizer' ? 'stabilizer' : activePickGroup === 'ritual' ? 'ritual' : 'foundation';
    const meta = CARDTYPE_META[ct];
    document.getElementById('pick-banner-text').textContent = `${meta.icon} Выбираешь «${meta.label}» (слот ${(activePickIdx||0)+1})`;
    banner.classList.add('visible');
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('grayed', btn.dataset.ct !== ct);
    });
  } else {
    banner.classList.remove('visible');
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('grayed'));
  }
}

// ─── SHOW RESULT ─────────────────────────────────────────────────
function showResult() {
  const stats  = calcStats();
  const result = calcResult(stats);
  const s = sc();
  const { solved, hurtAllies, teamUnhappy, wasteIds, overBudget, emptyRequired } = result;

  let debriefText;
  if (!solved)                        debriefText = s.debrief.fail;
  else if (hurtAllies || teamUnhappy) debriefText = s.debrief.partial;
  else                                debriefText = s.debrief.success;

  let mainIcon, mainTitle;
  if (!solved)                        { mainIcon='💀'; mainTitle='Задача не выполнена'; }
  else if (hurtAllies || teamUnhappy) { mainIcon='⚠️'; mainTitle='Частичный успех'; }
  else                                { mainIcon='🏆'; mainTitle='Успех!'; }

  const solvedRow = solved
    ? `<div class="event-row good"><span>✅</span> Задача решена</div>`
    : overBudget
      ? `<div class="event-row bad"><span>❌</span> Бюджет превышен (${stats.totalGold} > ${s.goldBudget} 💰) — задача не выполнена</div>`
      : `<div class="event-row bad"><span>❌</span> Задача не решена — эффектов не хватило</div>`;

  const alliesRow = hurtAllies && !emptyRequired.length
    ? `<div class="event-row bad"><span>💔</span> Задело своих — вред слишком высок</div>`
    : !hurtAllies ? `<div class="event-row good"><span>💚</span> Своих не задело</div>` : '';

  const teamRow = teamUnhappy
    ? `<div class="event-row warn"><span>😑</span> Команда недовольна — тяжело внедрять</div>`
    : `<div class="event-row good"><span>😊</span> Команда приняла зелье</div>`;

  const budgetRow = overBudget && solved
    ? `<div class="event-row warn"><span>💸</span> Бюджет превышен (${stats.totalGold} > ${s.goldBudget}) — в финале прошло</div>` : '';

  const reqSlotsRow = emptyRequired.length
    ? emptyRequired.map(g => {
        const note = g === 'ritual' && s.targetProps?.stubborn
          ? 'Цель Упрямая — без Ритуала внедрение не дойдёт'
          : `Слот «${CARDTYPE_META[g==='reagents'?'reagent':g==='catalysts'?'catalyst':g]?.label}» пуст — максимум частичный успех`;
        return `<div class="event-row warn"><span>🔒</span> ${note}</div>`;
      }).join('')
    : '';

  const reagentWarnRow = stats.reagentCount > 1
    ? `<div class="event-row warn"><span>⚗️</span> ${stats.reagentCount} реагента → вред каждого ×${stats.reagentHarmMul}${s.targetProps?.fragile ? ` × хрупкость ×${stats.fragileMul}` : ''}</div>` : '';

  const wasteHtml = wasteIds.length
    ? `<div class="waste-note">🗑 Лишние (не дают нужный эффект): ${wasteIds.map(id=>ing(id)?.name||id).join(', ')}</div>` : '';

  const conflictHtml = stats.conflictPairs.length
    ? `<div class="conflict-list">${stats.conflictPairs.map(p=>`<div class="conflict-item">⚡ ${ing(p.a)?.name} + ${ing(p.b)?.name}${p.note?' — '+p.note:''}</div>`).join('')}</div>` : '';

  const requiredSet = new Set(Object.keys(s.requires));
  const effDetails = Object.entries(stats.effects)
    .filter(([eff,v]) => v > 0 || requiredSet.has(eff))
    .map(([eff,v]) => {
      const m = EFFECT_META[eff], need = s.requires[eff], ok = !need || v >= need;
      return `<div class="detail-item"><div class="d-label">${m.icon} ${m.label}</div><div class="d-value ${ok?'ok':'bad'}">${v}${need?' / '+need:''}</div></div>`;
    });

  document.getElementById('result-panel').innerHTML = `
    <div class="result-header">
      <div class="result-icon">${mainIcon}</div>
      <div><div class="result-title">${mainTitle}</div><div class="result-subtitle">${s.requester}</div></div>
    </div>
    <div class="event-rows">
      ${solvedRow}${alliesRow}${teamRow}${budgetRow}${reqSlotsRow}${reagentWarnRow}
    </div>
    ${wasteHtml}${conflictHtml}
    <div class="result-story">${debriefText}</div>
    <button class="details-toggle" onclick="toggleDetails()">▾ Показать детали (числа)</button>
    <div id="result-details">
      <div class="details-grid">
        <div class="detail-item"><div class="d-label">Вред / лимит</div>
          <div class="d-value ${stats.totalHarm > s.harmLimit?'bad':'ok'}">${Math.round(stats.totalHarm)} / ${s.harmLimit}</div></div>
        <div class="detail-item"><div class="d-label">Принятие</div>
          <div class="d-value ${stats.adoptionPct < (s.teamHappyMin||50)?'bad':'ok'}">${stats.adoptionPct}%</div></div>
        <div class="detail-item"><div class="d-label">Стоимость / бюджет</div>
          <div class="d-value ${stats.totalGold > s.goldBudget?'bad':'ok'}">${stats.totalGold} / ${s.goldBudget} 💰</div></div>
        <div class="detail-item"><div class="d-label">Реагенты × вред</div>
          <div class="d-value">${stats.reagentCount} × ${stats.reagentHarmMul}${s.targetProps?.fragile?` × ${stats.fragileMul}`:''}</div></div>
        ${effDetails.join('')}
      </div>
    </div>`;

  document.getElementById('result-panel').style.display = 'block';
}

function toggleDetails() {
  const el = document.getElementById('result-details');
  const btn = document.querySelector('.details-toggle');
  const vis = el.style.display !== 'none' && el.style.display !== '';
  el.style.display = vis ? 'none' : 'block';
  btn.textContent = vis ? '▾ Показать детали (числа)' : '▴ Скрыть детали';
}

function hideResult() {
  const el = document.getElementById('result-panel');
  el.style.display = 'none';
  el.innerHTML = '';
}

// ─── EVENTS ──────────────────────────────────────────────────────
function onIngClick(id) {
  if (!activePickGroup) return;
  const card = ing(id);
  if (!card) return;

  if (activePickGroup === 'foundation') {
    slotFills.foundation = id;
  } else if (activePickGroup === 'reagents' || activePickGroup === 'catalysts') {
    slotFills[activePickGroup][activePickIdx] = id;
  } else {
    slotFills[activePickGroup] = id;
  }

  activePickGroup = null;
  activePickIdx   = null;
  updateUI(false);
}

function updateUI(showBrew) {
  const stats = calcStats();
  renderQuest();
  renderGold(stats);
  renderSlotGroups();
  renderEffectsPreview(stats);
  renderPickBanner();
  renderIngredients();
  if (!showBrew) hideResult();
}

function initScenario() {
  slotFills = { foundation:null, reagents:[null,null], catalysts:[null,null,null], stabilizer:null, ritual:null };
  visibleSlots = { reagents:1, catalysts:1 };
  activePickGroup = null;
  activePickIdx   = null;
  currentCardType = 'reagent';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const reagentTab = document.querySelector('.tab-btn[data-ct="reagent"]');
  if (reagentTab) reagentTab.classList.add('active');
  document.getElementById('scenario-idx').textContent = `${scenarioIdx+1} / ${SCENARIOS.length}`;
  updateUI(false);
}

// ─── BOOT ────────────────────────────────────────────────────────
document.getElementById('btn-brew').addEventListener('click', () => {
  activePickGroup = null; activePickIdx = null;
  showResult();
  renderSlotGroups(); renderPickBanner(); renderIngredients();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  slotFills = { foundation:null, reagents:[null,null], catalysts:[null,null,null], stabilizer:null, ritual:null };
  visibleSlots = { reagents:1, catalysts:1 };
  activePickGroup = null; activePickIdx = null;
  updateUI(false);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (scenarioIdx < SCENARIOS.length-1) { scenarioIdx++; initScenario(); }
});
document.getElementById('btn-prev').addEventListener('click', () => {
  if (scenarioIdx > 0) { scenarioIdx--; initScenario(); }
});
document.getElementById('pick-cancel').addEventListener('click', () => {
  activePickGroup = null; activePickIdx = null;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('grayed'));
  updateUI(false);
});
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.classList.contains('grayed')) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCardType = btn.dataset.ct;
  renderIngredients();
});
document.addEventListener('click', e => {
  if (!activePickGroup) return;
  if (!e.target.closest('#col-cauldron') && !e.target.closest('#col-ingredients')) {
    activePickGroup = null; activePickIdx = null;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('grayed'));
    updateUI(false);
  }
});

initScenario();
</script>
</body>
</html>
